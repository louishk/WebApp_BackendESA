# =============================================================================
# SMD CallCenterWs SOAP Operations — Reservation & Move-In Reference
# =============================================================================
#
# Endpoint: https://api.smdservers.net/CCWs_3.5/CallCenterWs.asmx
# Namespace: http://tempuri.org/CallCenterWs/CallCenterWs
# Auth: sCorpCode, sCorpUserName (format: username:::APIKEY), sCorpPassword
#       Auto-injected by common/soap_client.py
#
# Tested against: LSETUP (2026-04-09)
#
# This documents the raw SOAP operations used by the reservations blueprint.
# For the HTTP API layer, see docs/api/reservations.yaml.
# =============================================================================

# -----------------------------------------------------------------------------
# 1. TenantNewDetailed_v3 — Create a new tenant
# -----------------------------------------------------------------------------
# Used by: POST /api/reservations/reserve (step 1)
#
# Parameters (auth fields omitted — auto-injected):
#   sWebPassword:      string  (opt)  — web portal password (usually empty)
#   sMrMrs:            string  (opt)  — salutation
#   sFName:            string  (opt)  — first name
#   sMI:               string  (opt)  — middle initial
#   sLName:            string  (opt)  — last name
#   sCompany:          string  (opt)  — company name
#   sAddr1:            string  (opt)  — address line 1
#   sAddr2:            string  (opt)  — address line 2
#   sCity:             string  (opt)  — city
#   sRegion:           string  (opt)  — state/region
#   sPostalCode:       string  (opt)  — postal code
#   sCountry:          string  (opt)  — country code
#   sPhone:            string  (opt)  — primary phone
#   sMrMrsAlt..sPhoneAlt:  string (opt) — alternate contact fields
#   sMrMrsBus..sPhoneBus:  string (opt) — business contact fields
#   sFax:              string  (opt)  — fax
#   sEmail:            string  (opt)  — email
#   sPager:            string  (opt)  — pager
#   sMobile:           string  (opt)  — mobile phone
#   bCommercial:       boolean (req)  — commercial tenant flag
#   bCompanyIsTenant:  boolean (req)  — company-as-tenant flag
#   dDOB:              dateTime(req)  — date of birth (NEVER empty — use 1900-01-01T00:00:00)
#   sTenNote:          string  (opt)  — tenant note
#   sLicense:          string  (opt)  — license number
#   sLicRegion:        string  (opt)  — license region
#   sSSN:              string  (opt)  — SSN (usually empty for SG)
#   sGateCode:         string  (opt)  — gate access code
#   sEmailAlt:         string  (opt)  — alternate email
#   sRelationshipAlt:  string  (opt)  — relationship to alternate
#   sTaxID:            string  (opt)  — tax ID
#   bSMSOptIn:         boolean (req)  — SMS opt-in flag
#   sCountryCode:      string  (opt)  — country code for mobile
#
# Response (result_tag="RT"):
#   Ret_Code:    string  — "1" on success
#   TenantID:    string  — new tenant ID (e.g. "1111172")
#   AccessCode:  string  — generated gate access code (e.g. "3506685952")
#
# CRITICAL: dDOB must NEVER be empty — SMD crashes with HTTP 500.
#           Always use "1900-01-01T00:00:00" as placeholder.

# -----------------------------------------------------------------------------
# 2. ReservationNewWithSource_v6 — Create a reservation
# -----------------------------------------------------------------------------
# Used by: POST /api/reservations/reserve (step 2), POST /api/reservations/create
#
# Parameters (auth fields omitted):
#   sLocationCode:     string   (opt)  — site code (e.g. "LSETUP")
#   sTenantID:         string   (opt)  — tenant ID (from TenantNewDetailed_v3)
#   sUnitID:           string   (opt)  — unit ID to reserve
#   dNeeded:           dateTime (req)  — desired move-in date
#   sComment:          string   (opt)  — reservation comment
#   iSource:           int      (req)  — source ID (usually 0)
#   sSource:           string   (opt)  — source name (e.g. "ESA Backend")
#   QTRentalTypeID:    int      (req)  — rental type ID (0 = default)
#   iInquiryType:      int      (req)  — inquiry channel type (0 = default)
#   dcQuotedRate:      decimal  (req)  — quoted monthly rate
#   dExpires:          dateTime (req)  — reservation expiry date
#   dFollowUp:         dateTime (req)  — follow-up date
#   sTrackingCode:     string   (opt)  — marketing tracking code
#   sCallerID:         string   (opt)  — caller/agent identifier
#   ConcessionID:      int      (req)  — discount/concession plan ID (0 = none)
#   PromoGlobalNum:    int      (req)  — global promo number (0 = none)
#
# Response (result_tag="RT"):
#   Ret_Code:  string  — WaitingID on success (positive int), error code on failure
#   Ret_Msg:   string  — GlobalWaitingNum on success, error message on failure
#
# IMPORTANT: This operation overloads Ret_Code/Ret_Msg:
#   - Success: Ret_Code = WaitingID (e.g. "850665"), Ret_Msg = GlobalWaitingNum (e.g. "1503404115")
#   - Failure: Ret_Code = negative error code, Ret_Msg = error message
#
# Known error codes:
#   -25  "Invalid Unit ID Provided." — unit doesn't exist or isn't rentable
#   -95  "Invalid tenantID provided." — tenant ID 0 or doesn't exist
#
# Date fields must NEVER be empty — always provide real datetime values.

# -----------------------------------------------------------------------------
# 3. ReservationList_v3 — List/get reservations
# -----------------------------------------------------------------------------
# Used by: GET /api/reservations/list, GET /api/reservations/<id>,
#          PUT /api/reservations/<id>/cancel (fetches current state)
#
# Parameters (auth fields omitted):
#   sLocationCode:      string (opt)  — site code
#   iGlobalWaitingNum:  int    (req)  — global waiting number (0 = all)
#   WaitingID:          int    (req)  — specific reservation (0 = all)
#
# Response (result_tag="Table"):
#   Returns array of reservation records with 193 fields (joined with unit + tenant data).
#
#   Key reservation fields:
#     WaitingID           — unique reservation ID
#     SiteID              — site ID
#     TenantID            — tenant ID (0 = walk-in/no tenant)
#     UnitID1             — reserved unit ID (also UnitID in unit section)
#     dPlaced             — date reservation was placed
#     dNeeded             — desired move-in date
#     dExpires            — reservation expiry date
#     dcPaidReserveFee    — fee paid (decimal, e.g. "0.0000")
#     sComment            — reservation comment (nullable)
#     bFollowup           — follow-up scheduled (boolean string)
#     dFollowup           — follow-up date
#     dFollowupLast       — last follow-up date
#     iWaitingStatus      — status (0=active, 2=cancelled)
#     dcRate_Quoted       — quoted rate
#     dcRate_Tax1_Quoted  — quoted tax 1
#     dcRate_Tax2_Quoted  — quoted tax 2
#     CorpUserID          — placing user ID
#     QTRentalTypeID      — rental type
#     sCancellationReason — cancellation reason (nullable)
#     dCancelled          — cancellation date
#     iInquiryType        — inquiry type code
#     iGlobalWaitingNum   — global waiting number
#     sTrackingCode       — marketing tracking code (nullable)
#     dCreated            — creation timestamp
#     dUpdated            — last update timestamp
#     dConverted_ToRsv    — conversion timestamp
#
#   Key unit fields (joined):
#     UnitID              — unit ID
#     sUnitName           — unit name (e.g. "1003")
#     iFloor              — floor number
#     dcWidth / dcLength  — unit dimensions
#     dcPushRate1         — push rate
#     dcStdRate1          — standard rate
#     bClimate            — climate controlled (unreliable for SG, see CLAUDE.md)
#     bRented             — currently rented
#     bRentable           — available for rent
#     dcWebRate           — web rate
#
#   Key tenant fields (joined):
#     TenantID1           — tenant ID
#     sFName              — first name
#     sLName              — last name
#     sCompany            — company
#     sPhone              — phone
#     sEmail              — email
#     sMobile             — mobile
#     sAddr1..sCountry    — address fields

