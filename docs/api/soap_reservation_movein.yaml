# 12. MoveInWithDiscount_v7 — Move-in with discount (most parameters)
# -----------------------------------------------------------------------------
# The most feature-rich move-in operation. Includes billing frequency, channel, keypad zone.
#
# Parameters (auth fields omitted):
#   sLocationCode:       string   (opt)  — site code
#   TenantID:            int      (req)  — tenant ID
#   sAccessCode:         string   (opt)  — access code
#   UnitID:              int      (req)  — unit ID
#   dStartDate:          dateTime (req)  — lease start
#   dEndDate:            dateTime (req)  — lease end
#   dcPaymentAmount:     decimal  (req)  — exact total from MoveInCostRetrieve
#   iCreditCardType:     int      (req)  — CC type (0 for cash)
#   sCreditCardNumber:   string   (opt)  — CC number
#   sCreditCardCVV:      string   (opt)  — CVV
#   sCCTrack2:           string   (opt)  — mag stripe track 2
#   dExpirationDate:     dateTime (req)  — CC expiry (placeholder ok)
#   sBillingName:        string   (opt)  — billing name
#   sBillingAddress:     string   (opt)  — billing address
#   sBillingZipCode:     string   (opt)  — billing zip
#   InsuranceCoverageID: int      (req)  — insurance (0 = none)
#   ConcessionPlanID:    int      (req)  — discount plan (0 = none)
#   iSource:             int      (req)  — source ID
#   sSource:             string   (opt)  — source name
#   bUsePushRate:        boolean  (req)  — use push rate
#   iPayMethod:          int      (req)  — 0=none, 1=CC, 2=cash, 3=check, 4=ACH
#   sABARoutingNum:      string   (opt)  — ACH routing
#   sAccountNum:         string   (opt)  — ACH account
#   iAccountType:        int      (req)  — ACH account type
#   iKeypadZoneID:       int      (req)  — keypad zone (0 = default)
#   iTimeZoneID:         int      (req)  — timezone (0 = default)
#   iBillingFrequency:   int      (req)  — billing frequency (SITE-SPECIFIC!)
#                                            LSETUP: 3 = valid (monthly)
#                                            1 and 2 are rejected on LSETUP
#   WaitingID:           int      (req)  — reservation ID (0 if no reservation)
#   ChannelType:         int      (req)  — channel type (0 = default)
#   bTestMode:           boolean  (req)  — test mode
#   bApplyInsuranceCredit: boolean (req) — apply insurance credit
#
# Response (result_tag="RT"):
#   Ret_Code:   string  — LedgerID on success, negative error code on failure
#   Ret_Msg:    string  — error message (null on success)
#
# Known error codes:
#   -11  "Payment amount does not match required payment of $X"
#   -28  "Invalid Billing Frequency value (N)" — site-specific valid values
#
# NOTE: iBillingFrequency is site-specific. Query the site's billing config
#       to determine valid values. For LSETUP, value 3 is valid.

