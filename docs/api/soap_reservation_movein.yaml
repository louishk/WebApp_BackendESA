# -----------------------------------------------------------------------------
# 10. MoveInCostRetrieveWithDiscount_v4 — Get move-in cost breakdown
# -----------------------------------------------------------------------------
# Use this to calculate the exact payment amount before calling a move-in operation.
#
# Parameters (auth fields omitted):
#   sLocationCode:       string   (opt)  — site code
#   iUnitID:             int      (req)  — unit ID
#   dMoveInDate:         dateTime (req)  — planned move-in date
#   InsuranceCoverageID: int      (req)  — insurance coverage (0 = none)
#   ConcessionPlanID:    int      (req)  — discount plan (0 = none)
#   ChannelType:         int      (req)  — channel type (0 = default)
#   bApplyInsuranceCredit: boolean (req) — apply insurance credit
#   sCreditCardNum:      string   (opt)  — CC number (for surcharge calc, usually empty)
#
# Response (result_tag="Table"):
#   Returns MULTIPLE ROWS — one per charge line. Sum dcTotal across all rows
#   for the total payment required.
#
#   Fields per row:
#     ChargeDescription:  string   — e.g. "First Monthly Rent Fee", "Administrative Fee", "Security Deposit"
#     ChargeAmount:       decimal  — base charge amount (before tax)
#     ChargeAmountRnd:    decimal  — rounded charge amount
#     TaxAmount:          decimal  — tax 1 amount
#     TaxAmount2:         decimal  — tax 2 amount
#     dcTotal:            decimal  — charge + taxes for this line
#     StartDate:          dateTime — charge period start
#     EndDate:            dateTime — charge period end
#     UnitID:             int      — unit ID
#     UnitName:           string   — unit name (e.g. "1003")
#     TypeName:           string   — unit type (e.g. "XL/110-130/DV/NC/SS/NP")
#     Width / Length:     int      — unit dimensions
#     bClimate:           boolean  — climate controlled
#     bMoveInRequired:    boolean  — whether this charge is mandatory
#     dcPushRate:         decimal  — push rate
#     dcTenantRate:       decimal  — tenant rate
#     WebRate:            decimal  — web rate
#     dcDiscount:         decimal  — discount amount applied
#     ConcessionID:       int      — concession ID (-999 = none)
#     Ret_Code:           string   — "1" on success
#     dcTax1 / dcTax2:    decimal  — tax rates
#     dcPriceTax1/2:      decimal  — price-level taxes
#     iDayStrtProrating:  int      — proration start day
#     iDayStrtProratePlusNext: int — proration threshold day
#     b2ndMonthProrate:   boolean  — second month proration flag
#     bAnnivDateLeasing:  boolean  — anniversary date leasing
#     dcRM_RoundTo:       decimal  — revenue management rounding
#     iCurrencyDecimalPlaces: int  — currency decimal places (2 for SGD)
#
# LSETUP example (unit 106020, move-in tomorrow):
#   Row 0: First Monthly Rent Fee = 448.00 + tax 40.32 = 488.32
#   Row 1: Administrative Fee     =  30.00 + tax  2.70 =  32.70
#   Row 2: Security Deposit       = 640.00 + tax  0.00 = 640.00
#   TOTAL = 1161.02

# -----------------------------------------------------------------------------
# 11. MoveInReservation_v6 — Move-in from existing reservation
# -----------------------------------------------------------------------------
# Converts a reservation into a move-in. Recommended for reservation-based flow.
#
# Parameters (auth fields omitted):
#   sLocationCode:       string   (opt)  — site code
#   WaitingID:           int      (req)  — reservation WaitingID
#   TenantID:            int      (req)  — tenant ID
#   UnitID:              int      (req)  — unit ID
#   dStartDate:          dateTime (req)  — lease start date
#   dEndDate:            dateTime (req)  — lease end date
#   dcPaymentAmount:     decimal  (req)  — MUST match MoveInCostRetrieve total exactly
#   iCreditCardType:     int      (req)  — CC type (0 when using cash)
#   sCreditCardNumber:   string   (opt)  — CC number (empty for cash)
#   sCreditCardCVV:      string   (opt)  — CVV (empty for cash)
#   dExpirationDate:     dateTime (req)  — CC expiry (placeholder: 2030-01-01T00:00:00)
#   sBillingName:        string   (opt)  — billing name
#   sBillingAddress:     string   (opt)  — billing address
#   sBillingZipCode:     string   (opt)  — billing zip
#   InsuranceCoverageID: int      (req)  — insurance (0 = none)
#   ConcessionPlanID:    int      (req)  — discount plan (0 = none)
#   iPayMethod:          int      (req)  — payment method:
#                                            0 = none (rejected — payment required)
#                                            1 = credit card
#                                            2 = cash (BYPASSES CC VALIDATION)
#                                            3 = check
#                                            4 = ACH
#   sABARoutingNum:      string   (opt)  — ACH routing (empty for cash)
#   sAccountNum:         string   (opt)  — ACH account (empty for cash)
#   iAccountType:        int      (req)  — ACH account type (0 for cash)
#   iSource:             int      (req)  — source ID (0 = default)
#   bTestMode:           boolean  (req)  — test mode (true = no actual charge)
#   bApplyInsuranceCredit: boolean (req) — apply insurance credit
#   iPromoGlobalNum:     int      (req)  — promo number (0 = none)
#
# Response (result_tag="RT"):
#   Ret_Code:   string  — LedgerID on success (positive int), error code on failure
#   iLeaseNum:  string  — lease number (present on success)
#
# Bypass CC: Set iPayMethod=2, iCreditCardType=0, empty CC fields.
#            dcPaymentAmount must still match the exact total from MoveInCostRetrieve.
#
# Known error codes:
#   -2   "Payment amount must be greater than zero"
#   -11  "Payment amount does not match required payment of $X"
#
# LSETUP test (bTestMode=true): Ret_Code=592446 (LedgerID), iLeaseNum=1643

