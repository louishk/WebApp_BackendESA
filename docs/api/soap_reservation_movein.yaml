# 18. MoveInCostRetrieveWithDiscount_28DayBilling_v3 — 28-day billing cost
# -----------------------------------------------------------------------------
# Used by: GET /api/reservations/move-in/cost?variant=28day
#
# Same response format as MoveInCostRetrieveWithDiscount_v4 but calculates
# charges using 28-day billing cycle (full month, not prorated).
#
# Parameters (auth fields omitted):
#   sLocationCode:       string   (opt)  — site code
#   iUnitID:             int      (req)  — unit ID
#   dMoveInDate:         dateTime (req)  — planned move-in date
#   InsuranceCoverageID: int      (req)  — insurance (0 = none)
#   ConcessionPlanID:    int      (req)  — discount plan (0 = none)
#   ChannelType:         int      (req)  — channel type (0 = default)
#   bApplyInsuranceCredit: boolean (req)
#
# Response: same Table structure as v4
#
# LSETUP example (unit 106020):
#   Row 0: First Monthly Rent Fee = 640.00 + tax 57.60 = 697.60 (full month, not prorated)
#   Row 1: Administrative Fee     =  30.00 + tax  2.70 =  32.70
#   Row 2: Security Deposit       = 640.00 + tax  0.00 = 640.00
#   TOTAL = 1370.30

# -----------------------------------------------------------------------------
# 19. MoveInCostRetrieveWithDiscount_Reservation_v4 — reservation-based cost
# -----------------------------------------------------------------------------
# Used by: GET /api/reservations/move-in/cost?variant=reservation
#
# Same as MoveInCostRetrieveWithDiscount_v4 but requires a WaitingID.
# Returns empty when WaitingID=0 — a real reservation is needed.
#
