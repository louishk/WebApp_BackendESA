# 4. ReservationUpdate_v4 — Update a reservation
# -----------------------------------------------------------------------------
# Used by: PUT /api/reservations/<id>, PUT /api/reservations/<id>/cancel
#
# Parameters (auth fields omitted):
#   sLocationCode:        string   (opt)  — site code
#   WaitingID:            int      (req)  — reservation to update
#   sTenantID:            string   (opt)  — tenant ID
#   sUnitID:              string   (opt)  — unit ID
#   dNeeded:              dateTime (req)  — move-in date (NEVER empty)
#   sComment:             string   (opt)  — comment
#   iStatus:              int      (req)  — status (0=active, 2=cancelled)
#   bFollowup:            boolean  (req)  — follow-up flag
#   dFollowup:            dateTime (req)  — follow-up date (NEVER empty)
#   dFollowupLast:        dateTime (req)  — last follow-up date (NEVER empty)
#   iInquiryType:         int      (req)  — inquiry type
#   dcQuotedRate:         decimal  (req)  — quoted rate
#   dExpires:             dateTime (req)  — expiry date (NEVER empty)
#   QTRentalTypeID:       int      (req)  — rental type
#   QTCancellationTypeID: int      (req)  — cancellation category (0 = none)
#   sCancellationReason:  string   (opt)  — cancellation reason text
#   ConcessionID:         int      (req)  — discount plan ID (0 = none)
#
# Response (result_tag="RT"):
#   Ret_Code:  string  — "0" on success, negative on failure
#   Ret_Msg:   string  — result message (nullable)
#
# CRITICAL: ALL dateTime fields must NEVER be empty strings.
#           SMD returns HTTP 500 on empty <dFollowup></dFollowup> etc.
#           Always use _parse_date() or fallback to today+offset.

