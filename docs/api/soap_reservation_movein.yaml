# =============================================================================
# RECOMMENDED FLOWS
# =============================================================================
#
# --- Walk-in Reservation (used by unit availability tool) ---
# 1. TenantNewDetailed_v3 → get TenantID
# 2. ReservationNewWithSource_v6 → get WaitingID (from Ret_Code)
# 3. (optional) ReservationNoteInsert → add notes
#
# --- Reservation to Move-In (CC bypass) ---
# 1. MoveInCostRetrieveWithDiscount_v4 → get exact total (sum all rows)
# 2. MoveInReservation_v6 with:
#    - iPayMethod = 2 (cash)
#    - dcPaymentAmount = exact total from step 1
#    - iCreditCardType = 0
#    - Empty CC fields
#    - bTestMode = false (true for testing)
#    → get LedgerID (from Ret_Code) + iLeaseNum
#
# --- Direct Move-In (no reservation, CC bypass) ---
# 1. TenantNewDetailed_v3 → get TenantID
# 2. MoveInCostRetrieveWithDiscount_v4 → get exact total
# 3. MoveInWithDiscount_v7 with:
#    - iPayMethod = 2 (cash)
#    - WaitingID = 0 (no reservation)
#    - iBillingFrequency = site-specific (3 for LSETUP)
#    - dcPaymentAmount = exact total
#    - bTestMode = false
#
# --- Cancel a Reservation ---
# 1. ReservationList_v3 → fetch current state (preserve date fields)
# 2. ReservationUpdate_v4 with iStatus=2 + cancellation reason


# =============================================================================
# iPayMethod VALUES (for CC bypass)
# =============================================================================
# 0 = None         — rejected ("Payment amount must be greater than zero")
# 1 = Credit Card  — requires valid CC fields
# 2 = Cash         — BYPASSES CC validation entirely
# 3 = Check        — bypasses CC
# 4 = ACH          — requires routing/account numbers
#
# Available on: MoveInReservation_v3-v6, MoveInWithDiscount_v3-v7
# NOT available on: MoveIn (basic) — always requires CC


# =============================================================================
# iBillingFrequency VALUES (site-specific)
# =============================================================================
# Values are site-specific. Query ProrationInformationRetrieve or test empirically.
# LSETUP: 3 = monthly (valid), 1 and 2 are rejected
# Error: -28 "Invalid Billing Frequency value (N)"
#
# Only required by MoveInWithDiscount_v7. MoveInReservation_v6 does not need it.
