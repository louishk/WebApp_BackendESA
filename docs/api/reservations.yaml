openapi: 3.0.3

info:
  title: ESA Backend — Reservations API
  description: >
    SOAP-backed reservation management endpoints for StorageMaker/SMD CallCenterWs.
    All routes are under the `reservations` Flask blueprint with URL prefix `/api/reservations`.

    **Authentication**: Bearer JWT in the `Authorization` header.

    **Rate limiting** is applied per API key per sliding window; limits vary by endpoint.

    **SOAP backend**: Mutation and read operations proxy to the SMD CallCenterWs SOAP
    service (`CallCenterWs.asmx`). The `site_code` parameter is validated against the
    `site_info` table in the `esa_pbi` database before every SOAP call.

    **Tracking endpoints** (`/track`, `/track/event`, `/track/batch`) do NOT call SOAP —
    they write directly to the `api_reservations` table in `esa_pbi` for distribution
    analytics and lifecycle tracking.

  version: "2.0.0"
  contact:
    name: ESA Backend

servers:
  - url: https://app.extraspaceasia.com.sg
    description: Production (Azure VM)

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        HS256-signed JWT issued by `POST /api/auth/token`. Include as
        `Authorization: Bearer <token>`.

  schemas:

    # -------------------------------------------------------------------------
    # Shared / reusable
    # -------------------------------------------------------------------------

    SiteCode:
      type: string
      description: >
        StorageMaker location code. Validated against the `site_info` table in
        the `esa_pbi` database before any SOAP call is made.
      example: "LSETUP"

    RetResult:
      type: object
      description: SOAP operation return code and message, passed through as-is.
      properties:
        ret_code:
          type: string
          nullable: true
          description: Return code from the SOAP operation (e.g. "0" for success).
          example: "0"
        message:
          type: string
          description: Human-readable return message from SOAP.
          example: "Reservation created successfully"

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "site_code is required"

    SoapErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "SOAP API error"

    # -------------------------------------------------------------------------
    # Request bodies
    # -------------------------------------------------------------------------

    ReserveUnitRequest:
      type: object
      required:
        - site_code
        - unit_id
        - first_name
        - last_name
        - phone
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        unit_id:
          type: integer
          description: StorageMaker unit ID to reserve.
          example: 10042
        first_name:
          type: string
          description: Tenant first name.
          maxLength: 100
          example: "John"
        last_name:
          type: string
          description: Tenant last name.
          maxLength: 100
          example: "Smith"
        phone:
          type: string
          description: Contact phone number.
          maxLength: 20
          example: "+6591234567"
        email:
          type: string
          format: email
          description: Contact email address (optional).
          maxLength: 100
          example: "john.smith@example.com"
        mobile:
          type: string
          description: Mobile phone (defaults to phone if omitted).
          maxLength: 20
          example: "+6591234567"
        address:
          type: string
          description: Street address.
          maxLength: 200
          example: "123 Orchard Road"
        city:
          type: string
          description: City.
          maxLength: 100
          example: "Singapore"
        postal_code:
          type: string
          description: Postal code.
          maxLength: 20
          example: "238858"
        country:
          type: string
          description: Country code (e.g. "SG").
          maxLength: 10
          example: "SG"
        comment:
          type: string
          description: Reservation comment (optional).
          maxLength: 500
          example: "Needs ground-floor access"
        quoted_rate:
          type: number
          format: float
          description: Monthly rate quoted to the prospective tenant.
          default: 0
          example: 280.00
        needed_date:
          type: string
          format: date
          description: Desired move-in date (YYYY-MM-DD). Defaults to tomorrow (UTC).
          example: "2026-03-17"
        source_name:
          type: string
          description: Human-readable source label passed to SOAP.
          maxLength: 64
          default: "ESA Backend"
          example: "Website"
        concession_id:
          type: integer
          description: Discount/concession plan ID to apply.
          default: 0
          example: 0
        source:
          type: string
          description: Distribution source tag for analytics tracking.
          maxLength: 50
          default: "api"
          example: "google_ads"
        gclid:
          type: string
          description: Google Click ID for marketing attribution.
          maxLength: 255
          example: "CjwKCAjw..."
        gid:
          type: string
          description: Google Analytics ID for tracking.
          maxLength: 255
          example: "GA1.2.123456789.1234567890"
        botid:
          type: string
          description: Bot/chat identifier for tracking.
          maxLength: 255
          example: "chatbot-v2"

    CreateReservationRequest:
      type: object
      required:
        - site_code
        - unit_id
        - tenant_id
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        unit_id:
          type: integer
          description: StorageMaker unit ID to reserve.
          example: 10042
        tenant_id:
          type: integer
          description: Existing tenant ID (required).
          example: 12345
        needed_date:
          type: string
          format: date
          description: Desired move-in date (YYYY-MM-DD). Defaults to tomorrow (UTC).
          example: "2026-03-17"
        expires_date:
          type: string
          format: date
          description: >
            Date the reservation expires if not converted (YYYY-MM-DD).
            Defaults to today + 14 days (UTC).
          example: "2026-03-30"
        followup_date:
          type: string
          format: date
          description: >
            Date for the next follow-up call (YYYY-MM-DD).
            Defaults to today + 3 days (UTC).
          example: "2026-03-19"
        quoted_rate:
          type: number
          format: float
          description: Monthly rate quoted to the prospective tenant.
          default: 0
          example: 280.00
        comment:
          type: string
          description: Free-text comment for the reservation.
          maxLength: 500
          default: ""
          example: "Walk-in from website enquiry"
        source_name:
          type: string
          description: Human-readable source label passed to SOAP.
          maxLength: 64
          default: "ESA Backend"
          example: "Website"
        concession_id:
          type: integer
          description: Discount/concession plan ID to apply.
          default: 0
          example: 0
        source:
          type: string
          description: Distribution source tag for analytics tracking.
          maxLength: 50
          default: "api"
          example: "google_ads"
        gclid:
          type: string
          description: Google Click ID for marketing attribution.
          maxLength: 255
        gid:
          type: string
          description: Google Analytics ID for tracking.
          maxLength: 255
        botid:
          type: string
          description: Bot/chat identifier for tracking.
          maxLength: 255

    UpdateReservationRequest:
      type: object
      required:
        - site_code
        - unit_id
        - needed_date
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        unit_id:
          type: integer
          description: Unit ID associated with the reservation.
          example: 10042
        tenant_id:
          type: string
          description: Tenant ID. Use "0" for walk-in.
          default: "0"
          example: "12345"
        needed_date:
          type: string
          format: date
          description: Desired move-in date (YYYY-MM-DD).
          example: "2026-03-20"
        comment:
          type: string
          description: Updated comment text.
          default: ""
          example: "Customer called to confirm"
        status:
          type: integer
          description: Reservation status code (0 = active, 2 = cancelled in SMD).
          default: 0
          example: 0
        followup:
          type: boolean
          description: Whether to schedule a follow-up call.
          default: false
          example: true
        followup_date:
          type: string
          format: date
          description: Date for follow-up (YYYY-MM-DD).
          default: ""
          example: "2026-03-21"
        followup_last_date:
          type: string
          format: date
          description: Date of the most recent follow-up contact.
          default: ""
          example: "2026-03-16"
        inquiry_type:
          type: integer
          description: Inquiry channel type code.
          default: 0
          example: 1
        quoted_rate:
          type: number
          format: float
          description: Updated quoted monthly rate.
          default: 0
          example: 265.00
        expires_date:
          type: string
          format: date
          description: Updated expiry date for the reservation.
          default: ""
          example: "2026-04-02"
        rental_type_id:
          type: integer
          description: SOAP `QTRentalTypeID`.
          default: 0
          example: 0
        cancellation_type_id:
          type: integer
          description: SOAP `QTCancellationTypeID` — cancellation category.
          default: 0
          example: 0
        cancellation_reason:
          type: string
          description: Free-text cancellation reason.
          default: ""
          example: ""
        concession_id:
          type: integer
          description: Discount/concession plan ID.
          default: 0
          example: 0

    CancelReservationRequest:
      type: object
      required:
        - site_code
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        cancellation_reason:
          type: string
          description: Free-text reason for cancellation.
          default: ""
          example: "Tenant found alternative storage"
        cancellation_type_id:
          type: integer
          description: SOAP `QTCancellationTypeID` — optional cancellation category code.
          default: 0
          example: 1

    AddNoteRequest:
      type: object
      required:
        - site_code
        - note
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        note:
          type: string
          description: Note text to attach to the reservation.
          example: "Customer confirmed move-in for the 20th"

    TrackReservationRequest:
      type: object
      required:
        - site_code
        - unit_id
        - waiting_id
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        unit_id:
          type: integer
          description: StorageMaker unit ID.
          example: 10042
        waiting_id:
          type: integer
          description: SMD WaitingID from SOAP reservation.
          example: 8821
        event_type:
          type: string
          enum: [reservation, move_in]
          description: >
            Type of event. `reservation` sets status to `created`;
            `move_in` sets status to `moved_in` and records `moved_in_at`.
          default: "reservation"
          example: "reservation"
        global_waiting_num:
          type: integer
          description: Global waiting number from SMD.
          example: 12345
        tenant_id:
          type: integer
          description: SMD tenant ID (optional).
          example: 67890
        quoted_rate:
          type: number
          format: float
          description: Quoted monthly rate.
          default: 0
          example: 280.00
        concession_id:
          type: integer
          description: Discount/concession plan ID.
          default: 0
          example: 0
        needed_date:
          type: string
          format: date
          description: Desired move-in date (YYYY-MM-DD).
          example: "2026-03-17"
        first_name:
          type: string
          maxLength: 100
          example: "John"
        last_name:
          type: string
          maxLength: 100
          example: "Smith"
        email:
          type: string
          maxLength: 100
          example: "john@example.com"
        phone:
          type: string
          maxLength: 20
          example: "+6591234567"
        mobile:
          type: string
          maxLength: 20
        source_name:
          type: string
          maxLength: 64
          default: "ESA Backend"
        comment:
          type: string
          maxLength: 500
        source:
          type: string
          description: Distribution source tag.
          maxLength: 50
          default: "api"
        gclid:
          type: string
          description: Google Click ID.
          maxLength: 255
        gid:
          type: string
          description: Google Analytics ID.
          maxLength: 255
        botid:
          type: string
          description: Bot/chat identifier.
          maxLength: 255

    TrackEventRequest:
      type: object
      required:
        - site_code
        - waiting_id
        - event_type
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        waiting_id:
          type: integer
          description: SMD WaitingID of the tracked reservation.
          example: 8821
        event_type:
          type: string
          enum: [move_in, cancellation, expiry]
          description: >
            Lifecycle event type. Updates status and sets the corresponding
            timestamp column (`moved_in_at`, `cancelled_at`, or `expired_at`).
          example: "move_in"
        comment:
          type: string
          description: Event notes (appended to existing comment with ` | ` separator).
          maxLength: 500
          example: "Confirmed move-in completed"

    TrackBatchRequest:
      type: object
      required:
        - records
      properties:
        records:
          type: array
          maxItems: 100
          description: >
            Array of reservation tracking records (max 100). Each record follows
            the same schema as `POST /api/reservations/track`.
          items:
            $ref: "#/components/schemas/TrackReservationRequest"

    # -------------------------------------------------------------------------
    # Response bodies
    # -------------------------------------------------------------------------

    ReserveUnitResponse:
      type: object
      required: [success, site_code, unit_id, message]
      properties:
        success:
          type: boolean
          example: true
        site_code:
          $ref: "#/components/schemas/SiteCode"
        unit_id:
          type: integer
          example: 10042
        tenant_id:
          type: string
          nullable: true
          description: TenantID created by TenantNewDetailed_v3.
          example: "67890"
        waiting_id:
          type: string
          nullable: true
          description: >
            WaitingID returned by ReservationNewWithSource_v6 (from `Ret_Code`
            field in SOAP response). Null if SOAP did not return one.
          example: "8821"
        global_waiting_num:
          type: string
          nullable: true
          description: Global waiting number (from `Ret_Msg` field in SOAP response).
          example: "12345"
        message:
          type: string
          example: "Reservation created"

    CreateReservationResponse:
      type: object
      required: [success, site_code, unit_id, message]
      properties:
        success:
          type: boolean
          example: true
        site_code:
          $ref: "#/components/schemas/SiteCode"
        unit_id:
          type: integer
          example: 10042
        tenant_id:
          type: integer
          description: The tenant_id provided in the request.
          example: 12345
        waiting_id:
          type: string
          nullable: true
          description: >
            WaitingID returned by ReservationNewWithSource_v6 (from `Ret_Code`
            field in SOAP response). Null if SOAP did not return one.
          example: "8821"
        global_waiting_num:
          type: string
          nullable: true
          description: Global waiting number (from `Ret_Msg` field in SOAP response).
          example: "12345"
        message:
          type: string
          example: "Reservation created"

    UpdateReservationResponse:
      type: object
      required: [success, waiting_id]
      properties:
        success:
          type: boolean
          example: true
        waiting_id:
          type: integer
          example: 8821
        ret_code:
          type: string
          nullable: true
          description: Return code from ReservationUpdate_v4 SOAP response.
          example: "0"
        message:
          type: string
          description: Return message from SOAP, or "Reservation updated" if null.
          example: "Reservation updated"

    CancelReservationResponse:
      type: object
      required: [success, waiting_id]
      properties:
        success:
          type: boolean
          example: true
        waiting_id:
          type: integer
          example: 8821
        ret_code:
          type: string
          nullable: true
          description: Return code from ReservationUpdate_v4 SOAP response.
          example: "0"
        message:
          type: string
          description: Return message from SOAP, or "Reservation cancelled" if null.
          example: "Reservation cancelled"

    ReservationRecord:
      type: object
      description: >
        A single reservation record as returned by the SMD `ReservationList_v3` SOAP
        operation. Field names are the raw SMD column names; exact set depends on the
        SMD version configured on each site.
      additionalProperties: true
      example:
        WaitingID: "8821"
        TenantID: "0"
        UnitID: "10042"
        dNeeded: "2026-03-20"
        dExpires: "2026-03-30"
        dcQuotedRate: "280.00"
        iStatus: "0"
        sComment: "Walk-in from website"

    ReservationListResponse:
      type: object
      required: [site_code, reservations, count]
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        reservations:
          type: array
          items:
            $ref: "#/components/schemas/ReservationRecord"
        count:
          type: integer
          example: 3

    ReservationGetResponse:
      type: object
      required: [site_code, reservation]
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        reservation:
          $ref: "#/components/schemas/ReservationRecord"

    NoteRecord:
      type: object
      description: >
        A single note record as returned by the SMD `ReservationNotesRetrieve`
        SOAP operation. Field names are raw SMD column names.
      additionalProperties: true
      example:
        NoteID: "4412"
        WaitingID: "8821"
        sNote: "Customer confirmed move-in for the 20th"
        dNoteDate: "2026-03-16"

    NotesListResponse:
      type: object
      required: [waiting_id, notes, count]
      properties:
        waiting_id:
          type: integer
          example: 8821
        notes:
          type: array
          items:
            $ref: "#/components/schemas/NoteRecord"
        count:
          type: integer
          example: 2

    AddNoteResponse:
      type: object
      required: [success, waiting_id]
      properties:
        success:
          type: boolean
          example: true
        waiting_id:
          type: integer
          example: 8821
        ret_code:
          type: string
          nullable: true
          description: Return code from ReservationNoteInsert SOAP response.
          example: "0"
        message:
          type: string
          description: Return message from SOAP, or "Note added" if null.
          example: "Note added"

    FeeRecord:
      type: object
      description: >
        A single fee configuration record as returned by `ReservationFeeRetrieve`.
        Field names are raw SMD column names.
      additionalProperties: true
      example:
        FeeTypeID: "1"
        FeeName: "Reservation Fee"
        FeeAmount: "50.00"
        bRefundable: "true"

    FeesResponse:
      type: object
      required: [site_code, fees]
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        fees:
          type: array
          items:
            $ref: "#/components/schemas/FeeRecord"

    TrackResponse:
      type: object
      required: [success, id, event_type]
      properties:
        success:
          type: boolean
          example: true
        id:
          type: integer
          description: Database record ID from api_reservations table.
          example: 42
        event_type:
          type: string
          example: "reservation"

    TrackEventResponse:
      type: object
      required: [success, waiting_id, status]
      properties:
        success:
          type: boolean
          example: true
        waiting_id:
          type: integer
          example: 8821
        status:
          type: string
          description: Updated status value.
          example: "moved_in"
        moved_in_at:
          type: string
          format: date-time
          nullable: true
          description: Present when event_type is move_in.
        cancelled_at:
          type: string
          format: date-time
          nullable: true
          description: Present when event_type is cancellation.
        expired_at:
          type: string
          format: date-time
          nullable: true
          description: Present when event_type is expiry.

    TrackBatchResponse:
      type: object
      required: [success, processed, inserted, updated, errors]
      properties:
        success:
          type: boolean
          example: true
        processed:
          type: integer
          description: Total records successfully processed (inserted + updated).
          example: 8
        inserted:
          type: integer
          description: Number of new records inserted.
          example: 5
        updated:
          type: integer
          description: Number of existing records updated (upsert conflict).
          example: 3
        errors:
          type: array
          description: Per-record errors with array index and message.
          items:
            type: object
            properties:
              index:
                type: integer
              error:
                type: string
          example:
            - index: 2
              error: "site_code is required"

    UnitAvailabilityReservationsResponse:
      type: object
      required: [reservations, count]
      properties:
        reservations:
          type: object
          description: >
            Map of `site_code:unit_id` → reservation details. Only includes
            reservations with status `created` (active).
          additionalProperties:
            type: object
            properties:
              waiting_id:
                type: integer
              tenant_id:
                type: integer
              first_name:
                type: string
              last_name:
                type: string
              quoted_rate:
                type: number
              needed_date:
                type: string
                format: date
                nullable: true
              expires_date:
                type: string
                format: date
                nullable: true
              status:
                type: string
              source:
                type: string
              source_name:
                type: string
              reserved_at:
                type: string
                format: date-time
                nullable: true
              soap_synced_at:
                type: string
                format: date-time
                nullable: true
              followup_date:
                type: string
                format: date
                nullable: true
              inquiry_type:
                type: integer
              rental_type_id:
                type: integer
              paid_reserve_fee:
                type: number
              reserve_fee_receipt_id:
                type: integer
              concession_id:
                type: integer
          example:
            "LSETUP:10042":
              waiting_id: 8821
              tenant_id: 0
              first_name: "John"
              last_name: "Smith"
              quoted_rate: 280.00
              needed_date: "2026-03-20"
              status: "created"
              source_name: "Website"
        count:
          type: integer
          example: 1
        last_synced:
          type: string
          format: date-time
          nullable: true
          description: Most recent soap_synced_at across returned records.

  responses:
    400BadRequest:
      description: Missing or invalid request parameter.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    401Unauthorized:
      description: Missing, expired, or invalid JWT.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Unauthorized"

    403Forbidden:
      description: JWT is valid but does not carry the required scope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Insufficient scope"

    404NotFound:
      description: The requested reservation does not exist for the given site.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Reservation not found"

    429TooManyRequests:
      description: Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Rate limit exceeded"

    500InternalError:
      description: Unexpected internal server error or SOAP configuration unavailable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    502SoapError:
      description: The upstream SMD SOAP service returned a fault.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SoapErrorResponse"


# =============================================================================
# Paths
# =============================================================================

paths:

  # ---------------------------------------------------------------------------
  # POST /api/reservations/reserve
  # ---------------------------------------------------------------------------
  /api/reservations/reserve:
    post:
      summary: Reserve unit (TenantNewDetailed_v3 + ReservationNewWithSource_v6)
      operationId: reservationReserve
      description: >
        Full reserve flow: creates a new tenant via `TenantNewDetailed_v3`, then
        creates a reservation via `ReservationNewWithSource_v6`. Used by the
        unit availability tool's walk-in reservation modal.

        Also records the reservation in the `api_reservations` tracking table for
        distribution analytics (source, gclid, gid, botid).

        **SOAP operations**: `TenantNewDetailed_v3`, then `ReservationNewWithSource_v6`

        **Audit event**: `RESERVATION_CREATED`

        **Rate limit**: 10 requests per 60 seconds per API key.

        **Required scope**: `reservations:write`
      tags:
        - SOAP Reservations
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReserveUnitRequest"
            example:
              site_code: "LSETUP"
              unit_id: 10042
              first_name: "John"
              last_name: "Smith"
              phone: "+6591234567"
              email: "john.smith@example.com"
              comment: "Needs ground-floor access"
              quoted_rate: 280.00
              concession_id: 0
      responses:
        "200":
          description: >
            Reservation submitted. The `waiting_id` contains the SMD-assigned
            WaitingID (returned as `Ret_Code` from the SOAP response).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReserveUnitResponse"
              example:
                success: true
                site_code: "LSETUP"
                unit_id: 10042
                tenant_id: "67890"
                waiting_id: "8821"
                global_waiting_num: "12345"
                message: "Reservation created"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"
        "502":
          $ref: "#/components/responses/502SoapError"

  # ---------------------------------------------------------------------------
  # POST /api/reservations/create
  # ---------------------------------------------------------------------------
  /api/reservations/create:
    post:
      summary: Create reservation for existing tenant (ReservationNewWithSource_v6)
      operationId: reservationCreate
      description: >
        Creates a new reservation via `ReservationNewWithSource_v6` for an
        existing tenant. Does NOT create a tenant — requires a valid `tenant_id`.
        Also records in the `api_reservations` tracking table.

        Date fields default when omitted:
        - `needed_date` → UTC today + 1 day
        - `expires_date` → UTC today + 14 days
        - `followup_date` → UTC today + 3 days

        **SOAP operation**: `ReservationNewWithSource_v6`

        **Audit event**: `RESERVATION_CREATED`

        **Rate limit**: 10 requests per 60 seconds per API key.

        **Required scope**: `reservations:write`
      tags:
        - SOAP Reservations
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationRequest"
            example:
              site_code: "LSETUP"
              unit_id: 10042
              tenant_id: 12345
              needed_date: "2026-03-17"
              quoted_rate: 280.00
              comment: "Website enquiry"
              source_name: "Website"
              concession_id: 0
      responses:
        "200":
          description: >
            Reservation created. The `waiting_id` field contains the SMD-assigned
            WaitingID. Check `ret_code` for SOAP-level status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateReservationResponse"
              example:
                success: true
                site_code: "LSETUP"
                unit_id: 10042
                tenant_id: 12345
                waiting_id: "8821"
                global_waiting_num: "12345"
                message: "Reservation created"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"
        "502":
          $ref: "#/components/responses/502SoapError"

  # ---------------------------------------------------------------------------
  # GET /api/reservations/list
  # ---------------------------------------------------------------------------
  /api/reservations/list:
    get:
      summary: List reservations for a site (ReservationList_v3)
      operationId: reservationList
      description: >
        Returns all active reservations for a site, or filters by `waiting_id`
        or `global_waiting_num` when provided. Both filter parameters default
        to 0, which the SMD API treats as "return all".

        **SOAP operation**: `ReservationList_v3`

        **Rate limit**: 30 requests per 60 seconds per API key.

        **Required scope**: `reservations:read`
      tags:
        - SOAP Reservations
      security:
        - BearerAuth: []
      parameters:
        - name: site_code
          in: query
          required: true
          description: StorageMaker location code.
          schema:
            $ref: "#/components/schemas/SiteCode"
        - name: waiting_id
          in: query
          required: false
          description: >
            Filter results to a specific reservation WaitingID. Pass 0 (default)
            to return all reservations for the site.
          schema:
            type: integer
            default: 0
          example: 0
        - name: global_waiting_num
          in: query
          required: false
          description: >
            Filter by global waiting number (`iGlobalWaitingNum` in SMD). Pass 0
            (default) to return all.
          schema:
            type: integer
            default: 0
          example: 0
      responses:
        "200":
          description: List of reservations (may be empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationListResponse"
              example:
                site_code: "LSETUP"
                reservations:
                  - WaitingID: "8821"
                    TenantID: "0"
                    UnitID: "10042"
                    dNeeded: "2026-03-20"
                    dExpires: "2026-03-30"
                    dcQuotedRate: "280.00"
                    iStatus: "0"
                count: 1
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"
        "502":
          $ref: "#/components/responses/502SoapError"

  # ---------------------------------------------------------------------------
  # GET /api/reservations/{waiting_id}
  # ---------------------------------------------------------------------------
  /api/reservations/{waiting_id}:
    get:
      summary: Get a single reservation (ReservationList_v3)
      operationId: reservationGet
      description: >
        Retrieves a single reservation by its `waiting_id`. Internally calls
        `ReservationList_v3` with the specific WaitingID and returns the first
        result. Returns 404 if SOAP returns no records.

        **SOAP operation**: `ReservationList_v3`

        **Rate limit**: 30 requests per 60 seconds per API key.

        **Required scope**: `reservations:read`
      tags:
        - SOAP Reservations
      security:
        - BearerAuth: []
      parameters:
        - name: waiting_id
          in: path
          required: true
          description: The SMD WaitingID of the reservation.
          schema:
            type: integer
          example: 8821
        - name: site_code
          in: query
          required: true
          description: StorageMaker location code.
          schema:
            $ref: "#/components/schemas/SiteCode"
      responses:
        "200":
          description: The reservation record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationGetResponse"
              example:
                site_code: "LSETUP"
                reservation:
                  WaitingID: "8821"
                  TenantID: "0"
                  UnitID: "10042"
                  dNeeded: "2026-03-20"
                  dExpires: "2026-03-30"
                  dcQuotedRate: "280.00"
                  iStatus: "0"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"
        "502":
          $ref: "#/components/responses/502SoapError"

    put:
      summary: Update a reservation (ReservationUpdate_v4)
      operationId: reservationUpdate
      description: >
        Updates an existing reservation via `ReservationUpdate_v4`. All mutable
        SMD reservation fields can be changed in a single call. To cancel,
        use the dedicated `PUT /api/reservations/{waiting_id}/cancel` endpoint
        instead.

        **SOAP operation**: `ReservationUpdate_v4`

        **Audit event**: `RESERVATION_UPDATED`

        **Rate limit**: 10 requests per 60 seconds per API key.

        **Required scope**: `reservations:write`
      tags:
        - SOAP Reservations
      security:
        - BearerAuth: []
      parameters:
        - name: waiting_id
          in: path
          required: true
          description: The SMD WaitingID of the reservation to update.
          schema:
            type: integer
          example: 8821
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReservationRequest"
            example:
              site_code: "LSETUP"
              unit_id: 10042
              needed_date: "2026-03-20"
              comment: "Customer called to confirm"
              followup: true
              followup_date: "2026-03-21"
              quoted_rate: 265.00
      responses:
        "200":
          description: Reservation updated. Check `ret_code` for SOAP-level status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateReservationResponse"
              example:
                success: true
                waiting_id: 8821
                ret_code: "0"
                message: "Reservation updated"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"
        "502":
          $ref: "#/components/responses/502SoapError"

  # ---------------------------------------------------------------------------
  # PUT /api/reservations/{waiting_id}/cancel
  # ---------------------------------------------------------------------------
  /api/reservations/{waiting_id}/cancel:
    put:
      summary: Cancel a reservation
      operationId: reservationCancel
      description: >
        Cancels a reservation by setting its SMD status to 2 (cancelled).
        Internally performs two SOAP calls:
        1. `ReservationList_v3` — fetches the current reservation to preserve
           existing field values.
        2. `ReservationUpdate_v4` — re-submits the record with `iStatus=2` and
           the supplied cancellation reason.

        Returns 404 if the reservation is not found in the first SOAP call.

        **SOAP operations**: `ReservationList_v3`, then `ReservationUpdate_v4`

        **Audit event**: `RESERVATION_CANCELLED`

        **Rate limit**: 10 requests per 60 seconds per API key.

        **Required scope**: `reservations:write`
      tags:
        - SOAP Reservations
      security:
        - BearerAuth: []
      parameters:
        - name: waiting_id
          in: path
          required: true
          description: The SMD WaitingID of the reservation to cancel.
          schema:
            type: integer
          example: 8821
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelReservationRequest"
            example:
              site_code: "LSETUP"
              cancellation_reason: "Tenant found alternative storage"
              cancellation_type_id: 1
      responses:
        "200":
          description: Reservation cancelled. Check `ret_code` for SOAP-level status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelReservationResponse"
              example:
                success: true
                waiting_id: 8821
                ret_code: "0"
                message: "Reservation cancelled"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"
        "502":
          $ref: "#/components/responses/502SoapError"

  # ---------------------------------------------------------------------------
  # GET /api/reservations/{waiting_id}/notes
  # POST /api/reservations/{waiting_id}/notes
  # ---------------------------------------------------------------------------
  /api/reservations/{waiting_id}/notes:
    get:
      summary: Get notes for a reservation (ReservationNotesRetrieve)
      operationId: reservationNotesGet
      description: >
        Returns all notes attached to a reservation from the SMD
        `ReservationNotesRetrieve` SOAP operation. Returns an empty array if
        no notes exist.

        **SOAP operation**: `ReservationNotesRetrieve`

        **Rate limit**: 30 requests per 60 seconds per API key.

        **Required scope**: `reservations:read`
      tags:
        - SOAP Reservations
      security:
        - BearerAuth: []
      parameters:
        - name: waiting_id
          in: path
          required: true
          description: The SMD WaitingID of the reservation.
          schema:
            type: integer
          example: 8821
        - name: site_code
          in: query
          required: true
          description: StorageMaker location code.
          schema:
            $ref: "#/components/schemas/SiteCode"
      responses:
        "200":
          description: List of notes (may be empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotesListResponse"
              example:
                waiting_id: 8821
                notes:
                  - NoteID: "4412"
                    WaitingID: "8821"
                    sNote: "Customer confirmed move-in for the 20th"
                    dNoteDate: "2026-03-16"
                count: 1
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"
        "502":
          $ref: "#/components/responses/502SoapError"

    post:
      summary: Add a note to a reservation (ReservationNoteInsert)
      operationId: reservationNotesAdd
      description: >
        Inserts a new note against a reservation via the SMD
        `ReservationNoteInsert` SOAP operation.

        **SOAP operation**: `ReservationNoteInsert`

        **Rate limit**: 20 requests per 60 seconds per API key.

        **Required scope**: `reservations:write`
      tags:
        - SOAP Reservations
      security:
        - BearerAuth: []
      parameters:
        - name: waiting_id
          in: path
          required: true
          description: The SMD WaitingID of the reservation.
          schema:
            type: integer
          example: 8821
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddNoteRequest"
            example:
              site_code: "LSETUP"
              note: "Customer confirmed move-in for the 20th"
      responses:
        "200":
          description: Note inserted. Check `ret_code` for SOAP-level status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddNoteResponse"
              example:
                success: true
                waiting_id: 8821
                ret_code: "0"
