                site_code: "LSETUP"
                fees:
                  - FeeTypeID: "1"
                    FeeName: "Reservation Fee"
                    FeeAmount: "50.00"
                    bRefundable: "true"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"
        "502":
          $ref: "#/components/responses/502SoapError"

  # ---------------------------------------------------------------------------
  # POST /api/reservations/track
  # ---------------------------------------------------------------------------
  /api/reservations/track:
    post:
      summary: Track external reservation/move-in record
      operationId: reservationTrack
      description: >
        Push an external reservation or move-in record into the `api_reservations`
        tracking table. **No SOAP call** — data goes directly to the database.

        Supports idempotent upsert on the `(site_code, waiting_id)` unique constraint.
        On conflict, existing fields are updated with the new values, except
        `tenant_id`, `global_waiting_num`, `gclid`, `gid`, and `botid` which use
        COALESCE to preserve existing non-null values.

        Use this endpoint to import reservations from external sources (Google Forms,
        chatbots, CRM, etc.) for distribution analytics and lifecycle tracking.

        **Database table**: `api_reservations` (esa_pbi)

        **Audit event**: `RESERVATION_TRACKED`

        **Rate limit**: 30 requests per 60 seconds per API key.

        **Required scope**: `reservations:track`
      tags:
        - Reservation Tracking
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackReservationRequest"
            example:
              site_code: "LSETUP"
              unit_id: 10042
              waiting_id: 8821
              event_type: "reservation"
              first_name: "John"
              last_name: "Smith"
              phone: "+6591234567"
              source: "google_ads"
              gclid: "CjwKCAjw..."
      responses:
        "200":
          description: Record tracked successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackResponse"
              example:
                success: true
                id: 42
                event_type: "reservation"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"

  # ---------------------------------------------------------------------------
  # PUT /api/reservations/track/event
  # ---------------------------------------------------------------------------
  /api/reservations/track/event:
    put:
      summary: Push lifecycle event on tracked reservation
      operationId: reservationTrackEvent
      description: >
        Update the status of a tracked reservation with a lifecycle event.
        **No SOAP call** — updates the `api_reservations` table directly.

        Event type mapping:
        - `move_in` → status=`moved_in`, sets `moved_in_at=NOW()`
        - `cancellation` → status=`cancelled`, sets `cancelled_at=NOW()`
        - `expiry` → status=`expired`, sets `expired_at=NOW()`

        If `comment` is provided, it is appended to the existing comment with
        a ` | ` separator.

        Returns 404 if no matching `(site_code, waiting_id)` record exists.

        **Database table**: `api_reservations` (esa_pbi)

        **Audit event**: `RESERVATION_EVENT`

        **Rate limit**: 30 requests per 60 seconds per API key.

        **Required scope**: `reservations:track`
      tags:
        - Reservation Tracking
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackEventRequest"
            example:
              site_code: "LSETUP"
              waiting_id: 8821
              event_type: "move_in"
              comment: "Confirmed move-in completed"
      responses:
        "200":
          description: Event recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackEventResponse"
              example:
                success: true
                waiting_id: 8821
                status: "moved_in"
                moved_in_at: "2026-03-20T08:30:00"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "404":
          $ref: "#/components/responses/404NotFound"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"

  # ---------------------------------------------------------------------------
  # POST /api/reservations/track/batch
  # ---------------------------------------------------------------------------
  /api/reservations/track/batch:
    post:
      summary: Bulk import tracked reservations
      operationId: reservationTrackBatch
      description: >
        Batch import external reservation records (max 100 per request).
        Each record uses the same schema and upsert logic as
        `POST /api/reservations/track`.

        Records are processed individually — a failure in one record does not
        abort the entire batch. Failed records are reported in the `errors` array
        with their array index and error message.

        **Database table**: `api_reservations` (esa_pbi)

        **Audit event**: `RESERVATION_BATCH_TRACKED`

        **Rate limit**: 5 requests per 60 seconds per API key.

        **Required scope**: `reservations:track`
      tags:
        - Reservation Tracking
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackBatchRequest"
            example:
              records:
                - site_code: "LSETUP"
                  unit_id: 10042
                  waiting_id: 8821
                  event_type: "reservation"
                  first_name: "John"
                  last_name: "Smith"
                - site_code: "LSETUP"
                  unit_id: 10043
                  waiting_id: 8822
                  event_type: "move_in"
                  first_name: "Jane"
                  last_name: "Doe"
      responses:
        "200":
          description: Batch processed (check `errors` for per-record failures).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackBatchResponse"
              example:
                success: true
                processed: 2
                inserted: 1
                updated: 1
                errors: []
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"

  # ---------------------------------------------------------------------------
  # GET /api/reservations/move-in/cost
  # ---------------------------------------------------------------------------
  /api/reservations/move-in/cost:
    get:
      summary: Get move-in cost breakdown
      operationId: moveInCost
      description: >
        Returns the move-in cost breakdown for a unit via SOAP MoveInCostRetrieve
        variants. Returns multiple charge rows (rent, admin fee, deposit, etc.).
        Sum `total` across all rows for the exact payment amount required by
        the move-in endpoints.

        **Variants** (selected via `variant` query parameter):
        - `standard` (default) — `MoveInCostRetrieveWithDiscount_v4`
        - `28day` — `MoveInCostRetrieveWithDiscount_28DayBilling_v3` (28-day billing)
        - `reservation` — `MoveInCostRetrieveWithDiscount_Reservation_v4` (requires `waiting_id`)
        - `push_rate` — `MoveInCostRetrieveWithPushRate_v2` (simplest, fewest params)

        **Rate limit**: 30 requests per 60 seconds per API key.

        **Required scope**: `reservations:read`
      tags:
        - Move-In
      security:
        - BearerAuth: []
      parameters:
        - name: site_code
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/SiteCode"
        - name: unit_id
          in: query
          required: true
          schema:
            type: integer
          example: 106020
        - name: move_in_date
          in: query
          required: false
          description: Move-in date (YYYY-MM-DD). Defaults to tomorrow.
          schema:
            type: string
            format: date
          example: "2026-04-10"
        - name: concession_id
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: insurance_id
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: variant
          in: query
          required: false
          description: >
            Cost calculation variant. `standard` (default), `28day`,
            `reservation` (requires waiting_id), or `push_rate`.
          schema:
            type: string
            enum: [standard, 28day, reservation, push_rate]
            default: standard
        - name: waiting_id
          in: query
          required: false
          description: Reservation WaitingID (required when variant=reservation).
          schema:
            type: integer
        - name: promo_id
          in: query
          required: false
          description: Promo global number (for variant=reservation).
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Cost breakdown with per-charge totals.
          content:
            application/json:
              example:
                site_code: "LSETUP"
                unit_id: 106020
                variant: "standard"
                operation: "MoveInCostRetrieveWithDiscount_v4"
                unit_name: "1003"
                unit_type: "XL/110-130/DV/NC/SS/NP"
                push_rate: 640.0
                tenant_rate: 640.0
                web_rate: 640.0
                discount: 0.0
                concession_id: -999
                charges:
                  - description: "First Monthly Rent Fee"
                    amount: 448.0
                    tax: 40.32
                    total: 488.32
                    required: true
                  - description: "Administrative Fee"
                    amount: 30.0
                    tax: 2.7
                    total: 32.7
                    required: true
                  - description: "Security Deposit"
                    amount: 640.0
                    tax: 0.0
                    total: 640.0
                    required: true
                total: 1161.02
                move_in_date: "2026-04-10"
                currency_decimals: 2
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"
        "502":
          $ref: "#/components/responses/502SoapError"

  # ---------------------------------------------------------------------------
  # POST /api/reservations/move-in
  # ---------------------------------------------------------------------------
  /api/reservations/move-in:
    post:
      summary: Move-in from reservation (MoveInReservation_v6)
      operationId: moveInReservation
      description: >
        Converts a reservation into a move-in via `MoveInReservation_v6`.
        Payment amount must match the exact total from
        `GET /api/reservations/move-in/cost`.


        **CC bypass**: Set `pay_method=2` (cash) to bypass credit card validation.


        **SOAP operation**: `MoveInReservation_v6` (sync) +
        `PaymentSimpleCash` (perpetual + prepay only) +
        `ScheduleTenantRateChange_v2` (when `ecri_auto_schedule_enabled`)
        as async follow-ups.


        **Audit event**: `MOVE_IN_COMPLETED`


        **Rate limit**: 5 requests per 60 seconds per API key.


        **Required scope**: `reservations:write`


        **Idempotency**: Pass header `Idempotency-Key: <opaque-string>` to make
        retries safe. Within 24h, replays of the same key return the cached
        response with `idempotent_replay: true` instead of re-firing SOAP.
        Bot **should** use this for every booking attempt.


        **Sanity guard**: Returns `400` if `payment_amount` is more than $0.50
        below the SOAP-truth move-in cost — prevents half-funded leases from
        bot bugs or stale quotes. Use `GET /api/reservations/move-in/cost` to
        get the authoritative number.


        **Perpetual + prepay orchestration**: When the booked concession is
        tied to a plan flagged `discount_perpetual=true` with
        `prepayment_months > 0`, the handler internally splits the payment
        into the SOAP MoveIn portion + a `PaymentSimpleCash` push for the
        prepay surplus, and schedules a future `ScheduleTenantRateChange_v2`
        to revert the rate at the end of the prepay window. The bot is
        unaware of the SOAP chain — it just passes
        `pricing.total_due_at_movein` from the recommend response as
        `payment_amount` here. The orchestration runs inline on the happy
        path (~2-3s); failures land in `mw_lease_followup_jobs` for the
        worker to retry with exponential backoff.
      tags:
        - Move-In
      security:
        - BearerAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema: { type: string, maxLength: 120 }
          description: >
            Opaque caller-provided string (e.g. UUID v4). Replays of the same
            key on the same API key within 24h return the cached response.
            Strongly recommended for every booking attempt.
      requestBody:
        required: true
        content:
          application/json:
            example:
              site_code: "LSETUP"
              waiting_id: 852514
              tenant_id: 1112556
              unit_id: 106096
              payment_amount: 422.24
              start_date: "2026-05-15"
              end_date: "2027-05-15"
              pay_method: 2
              concession_id: 4666
              insurance_id: 9649
              session_id: "smoke-p2c-1730000000"
              customer_id: "smoke_p2c"
            schema:
              type: object
              properties:
                site_code:        { type: string }
                waiting_id:       { type: integer }
                tenant_id:        { type: integer }
                unit_id:          { type: integer }
                payment_amount:
                  type: number
                  description: >
                    Pass `pricing.total_due_at_movein` from the recommend
                    response. For perpetual + prepay plans this includes the
                    full prepayment up front.
                start_date:       { type: string, format: date }
                end_date:         { type: string, format: date }
                pay_method:       { type: integer, default: 2 }
                concession_id:    { type: integer, default: 0 }
                insurance_id:     { type: integer, default: 0 }
                session_id:
                  type: string
                  description: >
                    Recommend session id — recommended for outcome
                    reconciliation against `mw_recommendations_served`.
                customer_id:
                  type: string
                  description: >
                    PandaAI customer id — recommended for personalisation
                    + audit trail.
                test_mode:        { type: boolean, default: false }
      responses:
        "200":
          description: >
            Move-in result. `ledger_id` is the new ledger ID on success.
            `followups` summarises the perpetual-orchestration outcome.
          content:
            application/json:
              examples:
                standard:
                  summary: Standard plan (no perpetual orchestration)
                  value:
                    success: true
                    site_code: "L017"
                    unit_id: 107197
                    tenant_id: 1112556
                    waiting_id: 852514
                    ledger_id: 593680
                    lease_num: 1651
                    ret_code: "593680"
                    message: "Move-in completed"
                    test_mode: false
                    followups: { enqueued: 0, reason: "standard plan; ECRI schedule disabled or not applicable" }
                perpetual_prepay:
                  summary: Perpetual + 6-month prepay (orchestration ran inline)
                  value:
                    success: true
                    site_code: "LSETUP"
                    unit_id: 106096
                    tenant_id: 1112556
                    waiting_id: 852514
                    ledger_id: 593680
                    lease_num: 1651
                    ret_code: "593680"
                    message: "Move-in completed"
                    test_mode: false
                    followups:
                      enqueued: 2
                      job_ids: [2, 3]
                      inline_ok: 2
                      pending_retry: 0
                      failed_permanent: 0
                idempotent_replay:
                  summary: Replay of an earlier Idempotency-Key
                  value:
                    success: true
                    ledger_id: 593680
                    lease_num: 1651
                    message: "Move-in completed"
                    idempotent_replay: true
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"
        "502":
          $ref: "#/components/responses/502SoapError"

  # ---------------------------------------------------------------------------
  # POST /api/reservations/move-in/direct
  # ---------------------------------------------------------------------------
  /api/reservations/move-in/direct:
    post:
      summary: Direct move-in with discount (MoveInWithDiscount_v7)
      operationId: moveInDirect
      description: >
        Direct move-in via `MoveInWithDiscount_v7`. No reservation required
        (set `waiting_id=0`). Includes billing frequency, source, and channel.

        **CC bypass**: Set `pay_method=2` (cash).

        **IMPORTANT**: `billing_frequency` is site-specific. For LSETUP, value 3
        is monthly. Values 1 and 2 are rejected with error -28.

        **SOAP operation**: `MoveInWithDiscount_v7`

        **Audit event**: `MOVE_IN_COMPLETED`

        **Rate limit**: 5 requests per 60 seconds per API key.

        **Required scope**: `reservations:write`
      tags:
        - Move-In
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            example:
              site_code: "LSETUP"
              tenant_id: 1111172
              unit_id: 106020
              payment_amount: 1161.02
              billing_frequency: 3
              start_date: "2026-04-10"
              pay_method: 2
              source_name: "ESA Backend"
              test_mode: true
      responses:
        "200":
          description: >
            Move-in result. `ledger_id` is the new ledger ID on success.
          content:
            application/json:
              example:
                success: true
                site_code: "LSETUP"
                unit_id: 106020
                tenant_id: 1111172
                ledger_id: 592447
                waiting_id: null
                ret_code: "592447"
                message: "Move-in completed"
                test_mode: true
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"
        "502":
          $ref: "#/components/responses/502SoapError"

  # ---------------------------------------------------------------------------
  # GET /api/unit-availability/reservations
  # ---------------------------------------------------------------------------
  /api/unit-availability/reservations:
    get:
      summary: Get active reservation details for unit availability tool
      operationId: unitAvailabilityReservations
      description: >
        Returns active reservation details from `api_reservations` for units
        at the given sites. Only returns records with status `created` (active).
        Used by the unit availability tool to enrich reserved unit badges with
        tenant name, quoted rate, needed date, etc.

        **Note**: This endpoint is in the main `api` blueprint, not the
        `reservations` blueprint.

        **No SOAP call** — reads from `api_reservations` table.

        **Required scope**: `inventory:read`
      tags:
        - Unit Availability
      security:
        - BearerAuth: []
      parameters:
        - name: site_codes
          in: query
          required: true
          description: Comma-separated list of site codes (max 50).
          schema:
            type: string
          example: "LSETUP,L017"
      responses:
        "200":
          description: >
            Map of `site_code:unit_id` → reservation details for active reservations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnitAvailabilityReservationsResponse"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "500":
          $ref: "#/components/responses/500InternalError"

tags:
  - name: SOAP Reservations
    description: >
      SOAP-backed reservation lifecycle management. All endpoints proxy to the
      SMD CallCenterWs SOAP service. The `site_code` parameter is validated
      against the `esa_pbi` database on every request.

      Required JWT scopes:
      - `reservations:read` — GET endpoints
      - `reservations:write` — POST/PUT endpoints
  - name: Reservation Tracking
    description: >
      Database-backed reservation tracking for distribution analytics. No SOAP
      calls — data goes directly to the `api_reservations` table in `esa_pbi`.
      Supports external data sources (Google Forms, chatbots, CRM imports).

      Required JWT scope: `reservations:track`
  - name: Move-In
    description: >
      SOAP-backed move-in operations. Includes cost retrieval (multiple variants)
      and move-in execution with credit card bypass via `pay_method=2` (cash).

      Required JWT scopes:
      - `reservations:read` — cost retrieval
      - `reservations:write` — move-in execution
  - name: Unit Availability
    description: >
      Endpoints supporting the unit availability tool. These read from the
      `api_reservations` tracking table to enrich the UI.

      Required JWT scope: `inventory:read`
