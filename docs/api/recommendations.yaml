# =============================================================================
# Conversational flow examples (for bot integrators)
# =============================================================================
#
# Turn 1 — fresh request:
#   bot generates request_id, optionally session_id (else server fills)
#   POST { filters, context: { request_id, session_id?, customer_id? }}
#   ← { slots: [s1, s2, s3], session_id, tracking_id }
#   bot stores session_id locally
#
# Turn 2 — customer wants more like slot 1:
#   POST { filters, context: {
#       request_id: <new uuid>,
#       session_id: <same as turn 1>,
#       previous_request_id: <turn 1's request_id>,
#       picked_slot: 1,
#       action: more_like_this } }
#   ← { slots: [next 3 not-yet-shown], excludes prior unit_ids automatically }
#
# Turn 3 — customer accepts a slot, books:
#   POST /api/reservations/reserve with the slot's
#       { unit_id, concession_id, customer_data }
#       (optionally include session_id, customer_id, plan_id for tighter
#        outcome attribution — but the system reconciles even without)
#   ← reservation created, no payment, no concession applied yet
#
# Turn 4 — at actual move-in:
#   GET /api/reservations/move-in/cost?... → SOAP-derived total
#   POST /api/reservations/move-in { waiting_id, payment_amount = SOAP total }
#   ← lease created, payment captured
#
# Outcome auto-reconciles: middleware finds the most recent
# mw_recommendations_served row for this session/customer/unit, updates
# booked_unit_id / booked_plan_id / booked_concession_id / booked_slot.
# Bot doesn't have to call any "mark booked" endpoint.
# =============================================================================
