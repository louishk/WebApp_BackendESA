  # ---------------------------------------------------------------------------
  # POST /api/billing/payments/card
  # ---------------------------------------------------------------------------
  /api/billing/payments/card:
    post:
      summary: Record card payment (PaymentSimpleWithSource_v3)
      operationId: billingPaymentCard
      description: >
        Records a card payment against a ledger. Requires a `payment_type_id`
        from the `/payment-types` endpoint.

        **SOAP operation**: `PaymentSimpleWithSource_v3`

        **Audit event**: `PAYMENT_RECORDED`

        **Rate limit**: 5 requests per 60 seconds per API key.

        **Required scope**: `billing:write`
      tags:
        - Payments
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentCardRequest"
            example:
              site_code: "LSETUP"
              ledger_id: 5001
              amount: 280.00
              payment_type_id: 3
              source: "POS Terminal"
              test_mode: false
      responses:
        "200":
          description: >
            Payment submitted. Check `status` and `ret_code` for SOAP-level result.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/MutationResponse"
                  - type: object
                    properties:
                      ledger_id:
                        type: integer
                        example: 5001
              example:
                status: "success"
                site_code: "LSETUP"
                ledger_id: 5001
                ret_code: "1"
                ret_msg: ""
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"
        "502":
          $ref: "#/components/responses/502SoapError"

  # ---------------------------------------------------------------------------
  # POST /api/billing/payments/multi
  # ---------------------------------------------------------------------------
  /api/billing/payments/multi:
    post:
      summary: Record multiple payments (PaymentMultipleWithSource_v3)
      operationId: billingPaymentMulti
      description: >
        Records multiple payments in a single SOAP call. Ledger IDs, amounts,
        and payment type IDs are sent as comma-separated strings to the SOAP
        operation. Maximum 50 payments per request.

        **SOAP operation**: `PaymentMultipleWithSource_v3`

        **Audit event**: `PAYMENT_RECORDED`

        **Rate limit**: 5 requests per 60 seconds per API key.

        **Required scope**: `billing:write`
      tags:
        - Payments
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentMultiRequest"
            example:
              site_code: "LSETUP"
              payments:
                - ledger_id: 5001
                  amount: 280.00
                  payment_type_id: 3
                - ledger_id: 5002
                  amount: 150.00
                  payment_type_id: 3
              source: "Batch Payment"
              test_mode: false
      responses:
        "200":
          description: >
            Payments submitted. Check `status` and `ret_code` for SOAP-level result.
          content:
            application/json:
              schema:
                type: object
                required: [status, site_code, payment_count, ret_code, ret_msg]
                properties:
                  status:
                    type: string
                    enum: [success, error]
                    example: "success"
                  site_code:
                    $ref: "#/components/schemas/SiteCode"
                  payment_count:
                    type: integer
                    description: Number of payments in the request.
                    example: 2
                  ret_code:
                    type: string
                    nullable: true
                    example: "1"
                  ret_msg:
                    type: string
                    example: ""
              example:
                status: "success"
                site_code: "LSETUP"
                payment_count: 2
                ret_code: "1"
                ret_msg: ""
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"
        "502":
          $ref: "#/components/responses/502SoapError"

