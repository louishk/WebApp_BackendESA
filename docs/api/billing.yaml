openapi: 3.0.3

info:
  title: ESA Backend — Billing API
  description: >
    SOAP-backed billing management endpoints for StorageMaker/SMD CallCenterWs.
    All routes are under the `billing` Flask blueprint with URL prefix `/api/billing`.

    **Authentication**: Bearer JWT in the `Authorization` header.

    **Rate limiting** is applied per API key per sliding window; limits vary by endpoint.
    Read endpoints allow 30 req/min; write endpoints allow 5 req/min.

    **SOAP backend**: All operations proxy to the SMD CallCenterWs SOAP
    service (`CallCenterWs.asmx`). The `site_code` parameter is validated against the
    `site_info` table in the `esa_pbi` database before every SOAP call.

    **Sections**:
    1. Charge Management — add, list, update, and credit charges
    2. Ledger & Balance — ledger queries, balance details, statements, transfers
    3. Payments — cash, check, bank transfer, card, and multi-payment recording
    4. Refunds — cash, check, and credit card refunds
    5. Invoices & Move-Out — tenant invoices and move-out scheduling
    6. Insurance — add and query insurance coverage

  version: "1.0.0"
  contact:
    name: ESA Backend

servers:
  - url: https://app.extraspaceasia.com.sg
    description: Production (Azure VM)

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        HS256-signed JWT issued by `POST /api/auth/token`. Include as
        `Authorization: Bearer <token>`.

  schemas:

    # -------------------------------------------------------------------------
    # Shared / reusable
    # -------------------------------------------------------------------------

    SiteCode:
      type: string
      description: >
        StorageMaker location code. Validated against the `site_info` table in
        the `esa_pbi` database before any SOAP call is made.
      example: "LSETUP"

    RetResult:
      type: object
      description: SOAP operation return code and message, passed through as-is.
      properties:
        ret_code:
          type: string
          nullable: true
          description: Return code from the SOAP operation.
          example: "1"
        ret_msg:
          type: string
          description: Human-readable return message from SOAP.
          example: ""

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "site_code is required"

    SoapErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "SOAP API error"

    # -------------------------------------------------------------------------
    # Request bodies
    # -------------------------------------------------------------------------

    AddChargeRequest:
      type: object
      required:
        - site_code
        - ledger_id
        - charge_description_id
        - amount
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        ledger_id:
          type: integer
          description: Target ledger ID.
          minimum: 1
          example: 5001
        charge_description_id:
          type: integer
          description: Charge description ID (from `/charge-types`).
          minimum: 1
          example: 12
        amount:
          type: number
          format: float
          description: Charge amount.
          example: 150.00
        comment:
          type: string
          description: Optional comment for the charge.
          maxLength: 500
          default: ""
          example: "Late fee"

    RecurringChargeRequest:
      type: object
      required:
        - site_code
        - ledger_id
        - charge_description_id
        - amount
        - start_date
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        ledger_id:
          type: integer
          description: Target ledger ID.
          minimum: 1
          example: 5001
        charge_description_id:
          type: integer
          description: Charge description ID (from `/charge-types`).
          minimum: 1
          example: 12
        amount:
          type: number
          format: float
          description: Recurring charge amount.
          example: 50.00
        start_date:
          type: string
          format: date
          description: Start date for recurring charge (YYYY-MM-DD).
          example: "2026-05-01"
        frequency:
          type: integer
          description: Recurrence frequency in months (1-12).
          minimum: 1
          maximum: 12
          default: 1
          example: 1

    FutureChargesRequest:
      type: object
      required:
        - site_code
        - ledger_id
        - charge_through_date
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        ledger_id:
          type: integer
          description: Target ledger ID.
          minimum: 1
          example: 5001
        charge_through_date:
          type: string
          format: date
          description: Generate charges through this date (YYYY-MM-DD).
          example: "2026-06-30"

    UpdateChargePriceRequest:
      type: object
      required:
        - site_code
        - charge_id
        - new_price
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        charge_id:
          type: integer
          description: ID of the charge to update.
          minimum: 1
          example: 8001
        new_price:
          type: number
          format: float
          description: New price for the charge.
          example: 175.00

    ApplyCreditRequest:
      type: object
      required:
        - site_code
        - ledger_id
        - amount
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        ledger_id:
          type: integer
          description: Target ledger ID.
          minimum: 1
          example: 5001
        amount:
          type: number
          format: float
          description: Credit amount to apply.
          example: 25.00
        comment:
          type: string
          description: Optional comment for the credit.
          maxLength: 500
          default: ""
          example: "Goodwill credit"

    LedgerTransferRequest:
      type: object
      required:
        - site_code
        - ledger_id
        - new_tenant_id
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        ledger_id:
          type: integer
          description: Ledger ID to transfer.
          minimum: 1
          example: 5001
        new_tenant_id:
          type: integer
          description: Target tenant ID to receive the ledger.
          minimum: 1
          example: 67890

    RemoveDiscountRequest:
      type: object
      required:
        - site_code
        - ledger_id
        - discount_plan_id
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        ledger_id:
          type: integer
          description: Ledger ID to remove discount from.
          minimum: 1
          example: 5001
        discount_plan_id:
          type: integer
          description: Discount plan ID to remove.
          minimum: 1
          example: 42

    PaymentCashRequest:
      type: object
      required:
        - site_code
        - ledger_id
        - amount
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        ledger_id:
          type: integer
          description: Target ledger ID.
          minimum: 1
          example: 5001
        amount:
          type: number
          format: float
          description: Payment amount.
          example: 280.00
        source:
          type: string
          description: Payment source label passed to SOAP.
          maxLength: 64
          default: "ESA Backend"
          example: "Walk-in"
        test_mode:
          type: boolean
          description: If true, SOAP processes in test mode (no real transaction).
          default: false
          example: false

    PaymentCheckRequest:
      type: object
      required:
        - site_code
        - ledger_id
        - amount
        - check_number
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        ledger_id:
          type: integer
          description: Target ledger ID.
          minimum: 1
          example: 5001
        amount:
          type: number
          format: float
          description: Payment amount.
          example: 280.00
        check_number:
          type: string
          description: Check/cheque number.
          maxLength: 50
          example: "CHK-20260410-001"
        source:
          type: string
          description: Payment source label passed to SOAP.
          maxLength: 64
          default: "ESA Backend"
          example: "Walk-in"
        test_mode:
          type: boolean
          description: If true, SOAP processes in test mode.
          default: false

    PaymentBankTransferRequest:
      type: object
      required:
        - site_code
        - ledger_id
        - amount
        - reference
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        ledger_id:
          type: integer
          description: Target ledger ID.
          minimum: 1
          example: 5001
        amount:
          type: number
          format: float
          description: Payment amount.
          example: 280.00
        reference:
          type: string
          description: Bank transfer reference number.
          maxLength: 100
          example: "TRF-20260410-ABC"
        source:
          type: string
          description: Payment source label passed to SOAP.
          maxLength: 64
          default: "ESA Backend"
          example: "Online Banking"
        test_mode:
          type: boolean
          description: If true, SOAP processes in test mode.
          default: false

    PaymentCardRequest:
      type: object
      required:
        - site_code
        - ledger_id
        - amount
        - payment_type_id
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        ledger_id:
          type: integer
          description: Target ledger ID.
          minimum: 1
          example: 5001
        amount:
          type: number
          format: float
          description: Payment amount.
          example: 280.00
        payment_type_id:
          type: integer
          description: Payment type ID (from `/payment-types`).
          minimum: 1
          example: 3
        source:
          type: string
          description: Payment source label passed to SOAP.
          maxLength: 64
          default: "ESA Backend"
          example: "POS Terminal"
        test_mode:
          type: boolean
          description: If true, SOAP processes in test mode.
          default: false

    PaymentMultiRequest:
      type: object
      required:
        - site_code
        - payments
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        payments:
          type: array
          description: Array of payment entries (max 50).
          maxItems: 50
          items:
            type: object
            required:
              - ledger_id
              - amount
              - payment_type_id
            properties:
              ledger_id:
                type: integer
                description: Target ledger ID.
                minimum: 1
                example: 5001
              amount:
                type: number
                format: float
                description: Payment amount.
                example: 280.00
              payment_type_id:
                type: integer
                description: Payment type ID (from `/payment-types`).
                minimum: 1
                example: 3
        source:
          type: string
          description: Payment source label passed to SOAP.
          maxLength: 64
          default: "ESA Backend"
          example: "Batch Payment"
        test_mode:
          type: boolean
          description: If true, SOAP processes in test mode.
          default: false

    RefundCashRequest:
      type: object
      required:
        - site_code
        - ledger_id
        - amount
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        ledger_id:
          type: integer
          description: Target ledger ID.
          minimum: 1
          example: 5001
        amount:
          type: number
          format: float
          description: Refund amount.
          example: 50.00
        comment:
          type: string
          description: Optional comment for the refund.
          maxLength: 500
          default: ""
          example: "Overpayment refund"

    RefundCheckRequest:
      type: object
      required:
        - site_code
        - ledger_id
        - amount
        - check_number
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        ledger_id:
          type: integer
          description: Target ledger ID.
          minimum: 1
          example: 5001
        amount:
          type: number
          format: float
          description: Refund amount.
          example: 50.00
        check_number:
          type: string
          description: Refund check number.
          maxLength: 50
          example: "REF-CHK-001"
        comment:
          type: string
          description: Optional comment for the refund.
          maxLength: 500
          default: ""
          example: "Deposit refund"

    RefundCardRequest:
      type: object
      required:
        - site_code
        - ledger_id
        - amount
        - payment_id
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        ledger_id:
          type: integer
          description: Target ledger ID.
          minimum: 1
          example: 5001
        amount:
          type: number
          format: float
          description: Refund amount.
          example: 50.00
        payment_id:
          type: integer
          description: Original payment ID to refund against.
          minimum: 1
          example: 9001
        comment:
          type: string
          description: Optional comment for the refund.
          maxLength: 500
          default: ""
          example: "Card refund — duplicate charge"

    ScheduleMoveOutRequest:
      type: object
      required:
        - site_code
        - ledger_id
        - scheduled_date
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        ledger_id:
          type: integer
          description: Ledger ID to schedule move-out for.
          minimum: 1
          example: 5001
        scheduled_date:
          type: string
          format: date
          description: Scheduled move-out date (YYYY-MM-DD).
          example: "2026-05-31"

    AddInsuranceRequest:
      type: object
      required:
        - site_code
        - ledger_id
        - insurance_coverage_id
      properties:
        site_code:
          $ref: "#/components/schemas/SiteCode"
        ledger_id:
          type: integer
          description: Target ledger ID.
          minimum: 1
          example: 5001
        insurance_coverage_id:
          type: integer
          description: Insurance coverage plan ID to add.
          minimum: 1
          example: 7

    # -------------------------------------------------------------------------
    # Response bodies
    # -------------------------------------------------------------------------

    MutationResponse:
      type: object
      description: >
        Standard response for SOAP mutation operations. The `status` field
        indicates whether the SOAP call succeeded. `ret_code` and `ret_msg`
        are passed through from the SOAP response.
      required: [status, site_code, ret_code, ret_msg]
      properties:
        status:
          type: string
          enum: [success, error]
          example: "success"
        site_code:
          $ref: "#/components/schemas/SiteCode"
        ret_code:
          type: string
          nullable: true
          description: Return code from the SOAP operation.
          example: "1"
        ret_msg:
          type: string
          description: Return message from SOAP.
          example: ""

    ListResponse:
      type: object
      description: >
        Standard response for SOAP list/query operations. `data` contains the
        array of records returned by the SOAP operation. Field names within
        each record are the raw SMD column names.
      required: [status, site_code, count, data]
      properties:
        status:
          type: string
          enum: [success]
          example: "success"
        site_code:
          $ref: "#/components/schemas/SiteCode"
        count:
          type: integer
          description: Number of records returned.
          example: 3
        data:
          type: array
          description: Array of SOAP result records. Field names are raw SMD column names.
          items:
            type: object
            additionalProperties: true

    SoapRecord:
      type: object
      description: >
        A single record as returned by a SOAP operation. Field names are the
        raw SMD column names; exact set depends on the SOAP operation and
        SMD version configured on each site.
      additionalProperties: true

  responses:
    400BadRequest:
      description: Missing or invalid request parameter.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    401Unauthorized:
      description: Missing, expired, or invalid JWT.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Unauthorized"

    403Forbidden:
      description: JWT is valid but does not carry the required scope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Insufficient scope"

    429TooManyRequests:
      description: Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "Rate limit exceeded"

    500InternalError:
      description: Unexpected internal server error or SOAP configuration unavailable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    502SoapError:
      description: The upstream SMD SOAP service returned a fault.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SoapErrorResponse"


# =============================================================================
# Paths
# =============================================================================

paths:

  # ===========================================================================
  # SECTION 1: Charge Management
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # GET /api/billing/charge-types
  # ---------------------------------------------------------------------------
  /api/billing/charge-types:
    get:
      summary: List available charge types (ChargeDescriptionsRetrieve)
      operationId: billingChargeTypes
      description: >
        Returns the list of available charge description types for a site.
        These IDs are used when adding charges via `POST /charges`.

        **SOAP operation**: `ChargeDescriptionsRetrieve`

        **Rate limit**: 30 requests per 60 seconds per API key.

        **Required scope**: `billing:read`
      tags:
        - Charge Management
      security:
        - BearerAuth: []
      parameters:
        - name: site_code
          in: query
          required: true
          description: StorageMaker location code.
          schema:
            $ref: "#/components/schemas/SiteCode"
      responses:
        "200":
          description: List of charge description types.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResponse"
              example:
                status: "success"
                site_code: "LSETUP"
                count: 5
                data:
                  - ChargeDescriptionID: "12"
                    sDescription: "Late Fee"
                    dcAmount: "25.00"
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"
        "502":
          $ref: "#/components/responses/502SoapError"

  # ---------------------------------------------------------------------------
  # POST /api/billing/charges
  # ---------------------------------------------------------------------------
  /api/billing/charges:
    post:
      summary: Add a one-time charge (ChargeAddToLedger)
      operationId: billingAddCharge
      description: >
        Adds a one-time charge to a ledger via `ChargeAddToLedger`.

        **SOAP operation**: `ChargeAddToLedger`

        **Audit event**: `CHARGE_ADDED`

        **Rate limit**: 5 requests per 60 seconds per API key.

        **Required scope**: `billing:write`
      tags:
        - Charge Management
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddChargeRequest"
            example:
              site_code: "LSETUP"
              ledger_id: 5001
              charge_description_id: 12
              amount: 150.00
              comment: "Late fee"
      responses:
        "200":
          description: >
            Charge submitted. Check `status` and `ret_code` for SOAP-level result.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/MutationResponse"
                  - type: object
                    properties:
                      ledger_id:
                        type: integer
                        example: 5001
              example:
                status: "success"
                site_code: "LSETUP"
                ledger_id: 5001
                ret_code: "1"
                ret_msg: ""
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"
        "502":
          $ref: "#/components/responses/502SoapError"

  # ---------------------------------------------------------------------------
  # POST /api/billing/charges/recurring
  # ---------------------------------------------------------------------------
  /api/billing/charges/recurring:
    post:
      summary: Add a recurring charge (RecurringChargeAddToLedger_v1)
      operationId: billingAddRecurringCharge
      description: >
        Adds a recurring charge to a ledger. The charge recurs at the given
        `frequency` (in months) starting from `start_date`.

        **SOAP operation**: `RecurringChargeAddToLedger_v1`

        **Audit event**: `CHARGE_ADDED`

        **Rate limit**: 5 requests per 60 seconds per API key.

        **Required scope**: `billing:write`
      tags:
        - Charge Management
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecurringChargeRequest"
            example:
              site_code: "LSETUP"
              ledger_id: 5001
              charge_description_id: 12
              amount: 50.00
              start_date: "2026-05-01"
              frequency: 1
      responses:
        "200":
          description: >
            Recurring charge submitted. Check `status` and `ret_code` for SOAP-level result.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/MutationResponse"
                  - type: object
                    properties:
                      ledger_id:
                        type: integer
                        example: 5001
              example:
                status: "success"
                site_code: "LSETUP"
                ledger_id: 5001
                ret_code: "1"
                ret_msg: ""
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"
        "502":
          $ref: "#/components/responses/502SoapError"

  # ---------------------------------------------------------------------------
  # POST /api/billing/charges/future
  # ---------------------------------------------------------------------------
  /api/billing/charges/future:
    post:
      summary: Generate future charges (CustomerAccountsMakeFutureCharges)
      operationId: billingMakeFutureCharges
      description: >
        Generates all outstanding charges for a ledger through the specified date.

        **SOAP operation**: `CustomerAccountsMakeFutureCharges`

        **Audit event**: `CHARGE_ADDED`

        **Rate limit**: 5 requests per 60 seconds per API key.

        **Required scope**: `billing:write`
      tags:
        - Charge Management
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FutureChargesRequest"
            example:
              site_code: "LSETUP"
              ledger_id: 5001
              charge_through_date: "2026-06-30"
      responses:
        "200":
          description: >
            Future charges generated. Check `status` and `ret_code` for SOAP-level result.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/MutationResponse"
                  - type: object
                    properties:
                      ledger_id:
                        type: integer
                        example: 5001
              example:
                status: "success"
                site_code: "LSETUP"
                ledger_id: 5001
                ret_code: "1"
                ret_msg: ""
        "400":
          $ref: "#/components/responses/400BadRequest"
        "401":
          $ref: "#/components/responses/401Unauthorized"
        "403":
          $ref: "#/components/responses/403Forbidden"
        "429":
          $ref: "#/components/responses/429TooManyRequests"
        "500":
          $ref: "#/components/responses/500InternalError"
        "502":
          $ref: "#/components/responses/502SoapError"

  # ---------------------------------------------------------------------------
  # GET /api/billing/charges/{ledger_id}
  # ---------------------------------------------------------------------------
  /api/billing/charges/{ledger_id}:
    get:
      summary: List all charges for a ledger (ChargesAllByLedgerID)
      operationId: billingChargesByLedger
      description: >
        Returns all charges associated with a ledger.

        **SOAP operation**: `ChargesAllByLedgerID`

        **Rate limit**: 30 requests per 60 seconds per API key.

        **Required scope**: `billing:read`
      tags:
        - Charge Management
      security:
        - BearerAuth: []
      parameters:
        - name: ledger_id
          in: path
          required: true
          description: Ledger ID to retrieve charges for.
          schema:
            type: integer
            minimum: 1
          example: 5001
        - name: site_code
          in: query
          required: true
          description: StorageMaker location code.
          schema:
            $ref: "#/components/schemas/SiteCode"
      responses:
        "200":
          description: List of charges for the ledger.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ListResponse"
                  - type: object
                    properties:
                      ledger_id:
                        type: integer
                        example: 5001
              example:
                status: "success"
                site_code: "LSETUP"
                ledger_id: 5001
                count: 3
                data:
                  - ChargeID: "8001"
                    ChargeDescriptionID: "12"
