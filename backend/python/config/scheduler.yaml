# =============================================================================
# Pipeline runtime overrides
# =============================================================================
# Per-pipeline knobs read by sync_service/pipelines/* via
# common.config.get_pipeline_config('<pipeline>', '<key>', default).
#
# config_loader uses the filename as the namespace, so a `pipelines:` key here
# is reached at runtime as `config.scheduler.pipelines.<name>.<key>`.
#
# Filename kept as scheduler.yaml for backwards-compat with existing call
# sites; the daemon-specific sections (daemon, engine, resources, retry,
# health, shutdown, web, alerts) were stripped when the legacy APScheduler
# daemon was decommissioned.

# Location codes used by: rentroll, discount, mimo, ccws_*, etc.
location_codes: &location_codes
  - "L001"
  - "L002"
  - "L003"
  - "L004"
  - "L005"
  - "L006"
  - "L007"
  - "L008"
  - "L009"
  - "L010"
  - "L011"
  - "L013"
  - "L015"
  - "L017"
  - "L018"
  - "L019"
  - "L020"
  - "L021"
  - "L022"
  - "L023"
  - "L024"
  - "L025"
  - "L026"
  - "L028"
  - "L029"
  - "L030"
  - "L031"
  - "LSETUP"

pipelines:
  rentroll:
    sql_chunk_size: 300
    location_codes: *location_codes

  discount:
    sql_chunk_size: 500
    location_codes: *location_codes

  mimo:
    sql_chunk_size: 500
    location_codes: *location_codes
    days_back: 60
    days_forward: 365

  ccws_charge_descriptions:
    sql_chunk_size: 500
    location_codes: *location_codes

  ccws_insurance_coverage:
    sql_chunk_size: 500
    location_codes: *location_codes

  reservations_sync:
    sql_chunk_size: 500
    location_codes: *location_codes

  gateaccess:
    sql_chunk_size: 500
    location_codes: *location_codes

  fxrate:
    sql_chunk_size: 1000
    target_currencies:
      - "USD"
      - "HKD"
      - "KRW"
      - "JPY"
      - "AUD"
      - "NZD"
      - "TWD"
      - "THB"
      - "MYR"
      - "CNY"
    historical_start: "2010-01-01"
    incremental_days: 7

  embedsocial:
    sql_chunk_size: 500
    page_size: 50
    incremental_pages: 5

  sugarcrm:
    sql_chunk_size: 500
    batch_size: 200
    incremental_days: 7
    modules:
      - "Leads"
      - "Contacts"
      - "Accounts"
      - "Opportunities"
