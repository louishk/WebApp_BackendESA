# =============================================================================
# ESA Backend - Scheduler Configuration (merged)
# =============================================================================
# Daemon settings (APScheduler), app-level scheduler settings, pipelines, alerts.

scheduler:
  enabled: true
  timezone: "Asia/Singapore"
  max_workers: 5
  working_dir: "/var/www/backend/backend/python"

  # Daemon process settings
  daemon:
    pid_file: /var/run/pbi-scheduler.pid
    log_file: /var/log/pbi-scheduler/scheduler.log
    working_directory: ${SCHEDULER_WORKING_DIR}

  # APScheduler engine settings
  engine:
    timezone: Asia/Singapore
    job_defaults:
      coalesce: true                    # Combine missed runs into one
      max_instances: 1                  # Only one instance per job
      misfire_grace_time: 3600          # Allow 1 hour late execution

    # Job store (uses PostgreSQL from .env)
    jobstore:
      tablename: apscheduler_jobs

    # Thread pool executor
    executor:
      max_workers: 5                    # Max concurrent pipeline executions

  # Resource limits to prevent contention
  resources:
    db_pool:
      max_connections: 10               # Of 15 total PostgreSQL connections
      reserve_for_scheduler: 2          # Reserved for scheduler operations
    soap_api:
      max_concurrent: 5                 # Max concurrent SOAP API calls
    http_api:
      max_concurrent: 10                # Max concurrent HTTP API calls

  # Default retry settings
  retry:
    max_attempts: 3
    delay_seconds: 300
    backoff_multiplier: 2.0
    max_delay_seconds: 3600

  # Batch processing
  batch:
    chunk_size: 500
    compression_threshold: 1024

  # Health check settings
  health:
    heartbeat_interval_seconds: 30      # How often to update heartbeat
    stale_lock_timeout_seconds: 600     # Consider lock stale after 10 min

  # Graceful shutdown settings
  shutdown:
    timeout_seconds: 300                # Wait up to 5 min for running jobs
    wait_for_jobs: true                 # Wait for jobs to complete before exit

  # Web UI settings
  web:
    host: 0.0.0.0
    port: 5000
    debug: false

# Pipeline-specific settings
# Location codes used by: rentroll, discount, mimo, unitsinfo
location_codes: &location_codes
  - "L001"
  - "L002"
  - "L003"
  - "L004"
  - "L005"
  - "L006"
  - "L007"
  - "L008"
  - "L009"
  - "L010"
  - "L011"
  - "L013"
  - "L015"
  - "L017"
  - "L018"
  - "L019"
  - "L020"
  - "L021"
  - "L022"
  - "L023"
  - "L024"
  - "L025"
  - "L026"
  - "L028"
  - "L029"
  - "L030"
  - "L031"
  - "LSETUP"

pipelines:
  rentroll:
    sql_chunk_size: 300
    location_codes: *location_codes

  discount:
    sql_chunk_size: 500
    location_codes: *location_codes

  mimo:
    sql_chunk_size: 500
    location_codes: *location_codes
    days_back: 60
    days_forward: 365

  unitsinfo:
    sql_chunk_size: 500
    location_codes: *location_codes

  ccws_discount_plans:
    sql_chunk_size: 500
    location_codes: *location_codes

  ccws_charge_descriptions:
    sql_chunk_size: 500
    location_codes: *location_codes

  ccws_insurance_coverage:
    sql_chunk_size: 500
    location_codes: *location_codes

  reservations_sync:
    sql_chunk_size: 500
    location_codes: *location_codes

  gateaccess:
    sql_chunk_size: 500
    location_codes: *location_codes

  fxrate:
    sql_chunk_size: 1000
    target_currencies:
      - "USD"
      - "HKD"
      - "KRW"
      - "JPY"
      - "AUD"
      - "NZD"
      - "TWD"
      - "THB"
      - "MYR"
      - "CNY"
    historical_start: "2010-01-01"
    incremental_days: 7

  embedsocial:
    sql_chunk_size: 500
    page_size: 50
    incremental_pages: 5

  sugarcrm:
    sql_chunk_size: 500
    batch_size: 200
    incremental_days: 7
    modules:
      - "Leads"
      - "Contacts"
      - "Accounts"
      - "Opportunities"

# Alerts
alerts:
  slack:
    enabled: false
    webhook_url_vault: "SLACK_WEBHOOK_URL"  # Reference to vault secret
    channel: "#data-pipeline-alerts"
    notify_on:
      - "failure"
      - "recovery"

  email:
    enabled: false
    smtp_host: "smtp.your-provider.com"
    smtp_port: 587
    smtp_user: "alerts@your-domain.com"
    smtp_password_vault: "SMTP_PASSWORD"  # Reference to vault secret
    from_address: "pbi-scheduler@your-domain.com"
    to_addresses:
      - "data-team@your-domain.com"
