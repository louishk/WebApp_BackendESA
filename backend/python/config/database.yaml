# =============================================================================
# ESA Backend - Database Configuration
# =============================================================================
# Non-sensitive settings only. Passwords are stored in the vault.

# Backend database (users, pages, scheduler state)
backend:
  host: "esapbi.postgres.database.azure.com"
  port: 5432
  name: "backend"
  username: "esa_pbi_admin"
  password_vault: "DB_PASSWORD"  # Reference to vault secret
  sslmode: "require"
  pool:
    size: 5
    max_overflow: 10
    timeout: 60
    recycle: 1800

# Middleware database (discount plans, reservation fees, and other middleware-tier tables)
middleware:
  host: "esapbi.postgres.database.azure.com"
  port: 5432
  name: "esa_middleware"
  username: "esa_pbi_admin"
  password_vault: "DB_PASSWORD"
  sslmode: "require"
  pool:
    size: 5
    max_overflow: 10
    timeout: 60
    recycle: 1800

# PBI database (Power BI data warehouse)
pbi:
  host: "esapbi.postgres.database.azure.com"
  port: 5432
  name: "esa_pbi"
  username: "esa_pbi_admin"
  password_vault: "PBI_DB_PASSWORD"  # Reference to vault secret
  sslmode: "require"
  pool:
    size: 10
    max_overflow: 5

# Middleware database (recommender, discount plans, reservation fees,
# idempotency cache, DLQ, mw_recommendations_served, mw_unit_discount_
# candidates, mw_recommender_settings — anything mw_*).
middleware:
  host: "esapbi.postgres.database.azure.com"
  port: 5432
  name: "esa_middleware"
  username: "esa_pbi_admin"
  password_vault: "DB_PASSWORD"  # shared admin creds with `backend`
  sslmode: "require"
  pool:
    size: 10
    max_overflow: 10

# Redis cache (optional)
redis:
  enabled: true
  url: "redis://localhost:6379/0"
  default_ttl: 3600
