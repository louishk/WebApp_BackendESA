pipelines:
  unitsinfo:
    display_name: Units Information
    description: Fetch unit information (types, sizes, pricing) from SOAP API
    module_path: datalayer.units_info_to_sql
    enabled: true
    schedule:
      type: cron
      cron: 30 4 * * 0
    priority: 9
    resource_group: soap_api
    max_db_connections: 2
    estimated_duration_seconds: 300
    retry:
      max_attempts: 3
      delay_seconds: 300
      backoff_multiplier: 2
    timeout_seconds: 1200
    data_freshness:
      table: units_info
      date_column: updated_at
  unit_category_risk:
    display_name: Unit-Category Risk
    description: Compute country-scoped move-out risk factors per dimension/value
    module_path: datalayer.unit_category_risk
    enabled: true
    schedule:
      type: cron
      cron: 0 3 1 * *
    priority: 8
    resource_group: db_only
    max_db_connections: 2
    estimated_duration_seconds: 600
    retry:
      max_attempts: 2
      delay_seconds: 600
      backoff_multiplier: 2
    timeout_seconds: 1800
    data_freshness:
      table: unit_category_risk_baseline
      date_column: computed_at
  rentroll:
    display_name: RentRoll
    description: Fetch unit inventory and occupancy data
    module_path: datalayer.rentroll_to_sql
    enabled: true
    schedule:
      type: cron
      cron: 0 6 * * *
    default_args:
      mode: auto
    priority: 1
    conflicts_with:
    - discount
    - mimo
    resource_group: soap_api
    max_db_connections: 3
    estimated_duration_seconds: 900
    retry:
      max_attempts: 3
      delay_seconds: 300
      backoff_multiplier: 2
    timeout_seconds: 3600
    data_freshness:
      table: rentroll
      date_column: extract_date
  discount:
    display_name: Discounts
    description: Fetch discount and concession data
    module_path: datalayer.discount_to_sql
    enabled: true
    schedule:
      type: cron
      cron: 30 6 * * *
    default_args:
      mode: auto
    priority: 2
    conflicts_with:
    - rentroll
    - mimo
    resource_group: soap_api
    max_db_connections: 3
    estimated_duration_seconds: 600
    retry:
      max_attempts: 3
      delay_seconds: 300
    timeout_seconds: 3600
    data_freshness:
      table: discount
      date_column: extract_date
  mimo:
    display_name: Move-In/Move-Out
    description: Fetch tenant move-in and move-out data
    module_path: datalayer.moveinmoveout_to_sql
    enabled: true
    schedule:
      type: cron
      cron: 0 */4 * * *
    default_args:
      mode: auto
    priority: 2
    conflicts_with:
    - rentroll
    - discount
    resource_group: soap_api
    max_db_connections: 3
    estimated_duration_seconds: 600
    retry:
      max_attempts: 3
      delay_seconds: 300
    timeout_seconds: 3600
    data_freshness:
      table: mimo
      date_column: extract_date
  embedsocial:
    display_name: EmbedSocial Reviews
    description: Sync Google reviews from EmbedSocial API for review score tracking
    module_path: datalayer.embedsocial_to_sql
    enabled: true
    schedule:
      type: cron
      cron: 0 7 * * *
    default_args:
      mode: auto
    priority: 6
    resource_group: http_api
    max_db_connections: 2
    estimated_duration_seconds: 120
    retry:
      max_attempts: 3
      delay_seconds: 300
      backoff_multiplier: 2
    timeout_seconds: 600
    data_freshness:
      table: embedsocial_reviews
      date_column: synced_at
  zoom_contacts_sync:
    display_name: Zoom Contacts Sync
    description: Push SugarCRM contacts/leads to Zoom Phone External Contacts
    module_path: datalayer.zoom_contacts_sync
    enabled: false
    schedule:
      type: cron
      cron: "30 */3 * * *"
    default_args:
      mode: auto
    priority: 5
    resource_group: http_api
    max_db_connections: 2
    estimated_duration_seconds: 600
    retry:
      max_attempts: 3
      delay_seconds: 300
      backoff_multiplier: 2
    timeout_seconds: 1800
    data_freshness:
      table: zoom_contact_sync
      date_column: updated_at
  zoom_call_log_sync:
    display_name: Zoom Call Log Sync
    description: Pull Zoom call logs, match CRM contacts, push as SugarCRM Calls with transcripts
    module_path: datalayer.zoom_call_log_sync
    enabled: false
    schedule:
      type: cron
      cron: "*/30 * * * *"
    default_args:
      mode: auto
    priority: 5
    resource_group: http_api
    max_db_connections: 2
    estimated_duration_seconds: 300
    retry:
      max_attempts: 3
      delay_seconds: 300
      backoff_multiplier: 2
    timeout_seconds: 1200
    data_freshness:
      table: zoom_call_logs
      date_column: updated_at
    sync:
      strategy: watermark
      watermark_field: date_modified
      checkpoint_interval: 500
      phases:
        - name: fetch
          timeout: 300
        - name: match
          timeout: 120
          depends_on: fetch
        - name: push
          timeout: 300
          depends_on: match
