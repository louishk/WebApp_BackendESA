# MCP Server Nginx Configuration
# Proxies /mcp/* to the MCP server on port 8002
# Add this as a location block inside the main esa-backend server block,
# or as a separate server block if using a different subdomain.

# --- Option A: Location block within existing server ---
# Add these inside the 'server { listen 443 ... }' block in nginx-esa-backend.conf:

# OAuth well-known discovery (RFC 8414 path-based issuer resolution)
# claude.ai resolves issuer "https://host/mcp-server" by fetching
# "https://host/.well-known/oauth-authorization-server/mcp-server"
location ~ ^/\.well-known/(oauth-authorization-server|oauth-protected-resource|openid-configuration)(/.*)?$ {
    proxy_pass http://127.0.0.1:8002/.well-known/$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /mcp-server;
}

# MCP server endpoints
location /mcp-server/ {
    proxy_pass http://127.0.0.1:8002/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /mcp-server;
    proxy_set_header Connection "";

    # MCP requests can be long-running
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # Disable buffering for SSE streaming
    proxy_buffering off;
    proxy_cache off;
}

# MCP health check
location = /mcp-server/health {
    proxy_pass http://127.0.0.1:8002/health;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_connect_timeout 5s;
    proxy_read_timeout 5s;
    access_log off;
}
