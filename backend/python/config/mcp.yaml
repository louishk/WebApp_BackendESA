# =============================================================================
# MCP Server Configuration
# =============================================================================
# Secrets use _vault suffix — resolved automatically by config_loader
# Managed via /admin/secrets UI

server:
  name: "ESA Backend MCP"
  host: "127.0.0.1"
  port: 8002
  debug: false

# =============================================================================
# Microsoft OAuth (for claude.ai Enterprise connector SSO)
# =============================================================================
# Reuses the same Azure AD app registration as the Flask app.
# The MCP redirect_uri must be registered in Azure AD as an additional redirect.
microsoft_oauth:
  enabled: true
  client_id: "a95a430f-94c8-4c9d-8522-f5e26cebe8ec"
  client_secret_vault: "MS_OAUTH_CLIENT_SECRET"
  tenant_id: "45d0dc96-5f92-4a48-93c1-edea9332dd55"
  redirect_uri: "https://backend.extraspace.com.sg/mcp-server/oauth/callback"
  allowed_domains:
    - "extraspaceasia.com"

features:
  database: true
  google_ads: true
  google_analytics4: true
  google_searchconsole: true
  revenue: true
  naver_searchad: true
  sugarcrm: true

# =============================================================================
# Naver Search Ad API
# =============================================================================
# HMAC-SHA256 signed requests. Credentials resolved from vault in production;
# for local testing the service also falls back to .env (NAVER_SEARCHAD_*).
naver_searchad:
  base_url: "https://api.searchad.naver.com"
  api_key_vault: "NAVER_SEARCHAD_API_KEY"
  secret_key_vault: "NAVER_SEARCHAD_SECRET_KEY"
  customer_id_vault: "NAVER_SEARCHAD_CUSTOMER_ID"

# =============================================================================
# Google Ads API
# =============================================================================
google_ads:
  client_id: "387700327426-cmsrklgau8vqh9mnjvl95cc4vvenqj77.apps.googleusercontent.com"
  login_customer_id: "3494417856"
  client_secret_vault: "GOOGLE_ADS_CLIENT_SECRET"
  developer_token_vault: "GOOGLE_ADS_DEVELOPER_TOKEN"
  refresh_token_vault: "GOOGLE_ADS_REFRESH_TOKEN"

# =============================================================================
# Google Analytics 4 (Data + Admin API)
# =============================================================================
# Reuses the Google Ads OAuth client_id/client_secret, but requires a NEW
# refresh token minted with the analytics.readonly scope (Google refresh tokens
# are scope-locked at consent time). Use scripts/mint_ga4_refresh_token.py.
google_analytics4:
  client_id: "387700327426-cmsrklgau8vqh9mnjvl95cc4vvenqj77.apps.googleusercontent.com"
  client_secret_vault: "GOOGLE_ADS_CLIENT_SECRET"
  refresh_token_vault: "GOOGLE_ANALYTICS_REFRESH_TOKEN"

# =============================================================================
# Google Search Console API
# =============================================================================
# Reuses the Google Ads OAuth client_id/client_secret. Requires a NEW
# refresh token minted with the webmasters scope.
# Use scripts/mint_gsc_refresh_token.py.
google_searchconsole:
  client_id: "387700327426-cmsrklgau8vqh9mnjvl95cc4vvenqj77.apps.googleusercontent.com"
  client_secret_vault: "GOOGLE_ADS_CLIENT_SECRET"
  refresh_token_vault: "GOOGLE_SEARCHCONSOLE_REFRESH_TOKEN"

# =============================================================================
# SugarCRM REST v11 API
# =============================================================================
# Non-secret fields live here; password + client_secret resolved from vault.
sugarcrm:
  url: "https://extraspace.sugarondemand.com"
  username: "api_data"
  client_id: "sugar"
  platform: "mobile"
  api_version: "v11"
  timeout: 30
  password_vault: "SUGARCRM_PASSWORD"
  client_secret_vault: "SUGARCRM_CLIENT_SECRET"

# =============================================================================
# Database Presets (for DB_* MCP tools)
# =============================================================================
# Each key becomes a preset name (e.g. DB_connect_preset("esa_pbi"))

databases:
  esa_pbi:
    type: postgresql
    host: esapbi.postgres.database.azure.com
    port: 5432
    database: esa_pbi
    user: esa_pbi_admin
    password_vault: PBI_DB_PASSWORD
    ssl: true

  esa_backend:
    type: postgresql
    host: esapbi.postgres.database.azure.com
    port: 5432
    database: backend
    user: esa_pbi_admin
    password_vault: PBI_DB_PASSWORD
    ssl: true

  rudderstack:
    type: postgresql
    host: esapbi.postgres.database.azure.com
    port: 5432
    database: rudderstack
    user: esa_pbi_admin
    password_vault: PBI_DB_PASSWORD
    ssl: true

  bigquery:
    type: bigquery
    project_id: planar-beach-485003-v9
    location: asia-southeast1
    credentials_json_vault: BIGQUERY_SA_JSON

  kinsta_esa_sg:
    type: mysql
    host: 127.0.0.1
    port: 13306
    database: extraspaceasiasg
    user: extraspaceasiasg
    password_vault: MYSQL1_PASSWORD
    note: "Requires SSH tunnel to Kinsta"

  kinsta_esa_my:
    type: mysql
    host: 127.0.0.1
    port: 13307
    database: extraspaceasiamy
    user: extraspaceasiamy
    password_vault: MYSQL2_PASSWORD
    note: "Requires SSH tunnel to Kinsta"

  kinsta_esa_kr:
    type: mysql
    host: 127.0.0.1
    port: 13308
    database: extraspaceasiakr
    user: extraspaceasiakr
    password_vault: MYSQL3_PASSWORD
    note: "Requires SSH tunnel to Kinsta"

  kinsta_esa_hk:
    type: mysql
    host: 127.0.0.1
    port: 13309
    database: extraspaceasiahk
    user: extraspaceasiahk
    password_vault: MYSQL4_PASSWORD
    note: "Requires SSH tunnel to Kinsta"
