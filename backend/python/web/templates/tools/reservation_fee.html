{% extends "base.html" %}
{% block title %}Reservation Fees{% endblock %}

{% block content %}
<div class="container" style="max-width: 1000px; margin: 1.5rem auto; padding: 0 1rem;">
    <h1 style="margin-bottom: 1rem;">Reservation Fees</h1>
    <p style="color: #666; margin-bottom: 1.5rem;">
        Manage the reservation fee charged at each site, in the site's local currency.
    </p>

    <div class="card" style="padding: 1rem; margin-bottom: 1.5rem;">
        <h3 style="margin-top: 0;">Add / Update Fee</h3>
        <div style="display: flex; gap: 0.75rem; align-items: end; flex-wrap: wrap;">
            <div style="flex: 2; min-width: 220px;">
                <label for="rf-site" style="display: block; font-size: 0.85rem; color: #555;">Site</label>
                <select id="rf-site" style="width: 100%; padding: 0.5rem;"></select>
            </div>
            <div style="flex: 1; min-width: 140px;">
                <label for="rf-fee" style="display: block; font-size: 0.85rem; color: #555;">Reservation Fee</label>
                <input id="rf-fee" type="number" step="0.01" min="0" placeholder="0.00"
                       style="width: 100%; padding: 0.5rem;">
            </div>
            <button id="rf-save" class="btn btn-primary" style="padding: 0.55rem 1.25rem;">Save</button>
        </div>
        <div id="rf-msg" style="margin-top: 0.75rem; font-size: 0.9rem;"></div>
    </div>

    <div class="card" style="padding: 1rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
            <h3 style="margin: 0;">Existing Fees</h3>
            <input id="rf-filter" type="text" placeholder="Filter by site code…"
                   style="padding: 0.4rem; width: 220px;">
        </div>
        <table style="width: 100%; border-collapse: collapse;" id="rf-table">
            <thead>
                <tr style="background: #f5f5f5; text-align: left;">
                    <th style="padding: 0.5rem;">Site Code</th>
                    <th style="padding: 0.5rem;">Site ID</th>
                    <th style="padding: 0.5rem;">Reservation Fee</th>
                    <th style="padding: 0.5rem;">Updated</th>
                    <th style="padding: 0.5rem; width: 180px;">Actions</th>
                </tr>
            </thead>
            <tbody id="rf-tbody">
                <tr><td colspan="5" style="padding: 1rem; text-align: center; color: #888;">Loading…</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
(function () {
    const $ = (id) => document.getElementById(id);
    const csrfToken = (document.querySelector('meta[name="csrf-token"]') || {}).content || '';
    function jsonHeaders() {
        const h = { 'Content-Type': 'application/json' };
        if (csrfToken) h['X-CSRFToken'] = csrfToken;
        return h;
    }
    function deleteHeaders() {
        const h = {};
        if (csrfToken) h['X-CSRFToken'] = csrfToken;
        return h;
    }
    const tbody = $('rf-tbody');
    const msg = $('rf-msg');
    const filterInput = $('rf-filter');
    let allFees = [];
    let sites = [];

    function showMsg(text, ok) {
        msg.textContent = text || '';
        msg.style.color = ok ? '#1a7f37' : '#c41230';
    }

    function fmtFee(v) {
        if (v == null) return '';
        return Number(v).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtDate(s) {
        if (!s) return '';
        try { return new Date(s).toLocaleString(); } catch (e) { return s; }
    }

    function render() {
        const q = (filterInput.value || '').trim().toUpperCase();
        const rows = allFees.filter(f => !q || (f.site_code || '').toUpperCase().includes(q));
        if (rows.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="padding: 1rem; text-align: center; color: #888;">No reservation fees yet.</td></tr>';
            return;
        }
        tbody.innerHTML = rows.map(f => `
            <tr data-id="${f.id}" style="border-top: 1px solid #eee;">
                <td style="padding: 0.5rem;"><strong>${f.site_code || ''}</strong></td>
                <td style="padding: 0.5rem;">${f.site_id}</td>
                <td style="padding: 0.5rem;">
                    <input type="number" step="0.01" min="0" value="${f.reservation_fee}"
                           class="rf-edit" style="width: 120px; padding: 0.3rem;">
                </td>
                <td style="padding: 0.5rem; color: #666; font-size: 0.85rem;">${fmtDate(f.updated_at)}</td>
                <td style="padding: 0.5rem;">
                    <button class="btn rf-update" style="padding: 0.3rem 0.6rem;">Update</button>
                    <button class="btn rf-delete" style="padding: 0.3rem 0.6rem; background: #c41230; color: #fff;">Delete</button>
                </td>
            </tr>
        `).join('');

        tbody.querySelectorAll('.rf-update').forEach(btn => {
            btn.addEventListener('click', onUpdate);
        });
        tbody.querySelectorAll('.rf-delete').forEach(btn => {
            btn.addEventListener('click', onDelete);
        });
    }

    async function loadSites() {
        const res = await fetch('/reservation-fees/sites');
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load sites');
        sites = data.sites || [];
        const sel = $('rf-site');
        sel.innerHTML = '<option value="">— Select site —</option>' +
            sites.map(s => `<option value="${s.site_id}">${s.site_code} — ${s.name || ''}</option>`).join('');
    }

    async function loadFees() {
        const res = await fetch('/reservation-fees/list');
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load fees');
        allFees = data.fees || [];
        render();
    }

    async function onSave() {
        showMsg('');
        const siteId = $('rf-site').value;
        const fee = $('rf-fee').value;
        if (!siteId) { showMsg('Select a site.', false); return; }
        if (fee === '' || isNaN(Number(fee))) { showMsg('Enter a valid fee.', false); return; }

        const res = await fetch('/reservation-fees/create', {
            method: 'POST',
            headers: jsonHeaders(),
            body: JSON.stringify({ site_id: Number(siteId), reservation_fee: Number(fee) }),
        });
        const data = await res.json();
        if (!res.ok) { showMsg(data.error || 'Failed to save', false); return; }
        showMsg('Saved.', true);
        $('rf-fee').value = '';
        $('rf-site').value = '';
        await loadFees();
    }

    async function onUpdate(ev) {
        const tr = ev.target.closest('tr');
        const id = tr.dataset.id;
        const val = tr.querySelector('.rf-edit').value;
        if (val === '' || isNaN(Number(val))) { showMsg('Enter a valid fee.', false); return; }
        const res = await fetch(`/reservation-fees/${id}`, {
            method: 'PUT',
            headers: jsonHeaders(),
            body: JSON.stringify({ reservation_fee: Number(val) }),
        });
        const data = await res.json();
        if (!res.ok) { showMsg(data.error || 'Failed to update', false); return; }
        showMsg('Updated.', true);
        await loadFees();
    }

    async function onDelete(ev) {
        const tr = ev.target.closest('tr');
        const id = tr.dataset.id;
        if (!confirm('Delete this reservation fee?')) return;
        const res = await fetch(`/reservation-fees/${id}`, { method: 'DELETE', headers: deleteHeaders() });
        const data = await res.json();
        if (!res.ok) { showMsg(data.error || 'Failed to delete', false); return; }
        showMsg('Deleted.', true);
        await loadFees();
    }

    $('rf-save').addEventListener('click', onSave);
    filterInput.addEventListener('input', render);

    (async () => {
        try {
            await loadSites();
            await loadFees();
        } catch (e) {
            showMsg(e.message, false);
            tbody.innerHTML = '<tr><td colspan="5" style="padding: 1rem; text-align: center; color: #c41230;">Failed to load.</td></tr>';
        }
    })();
})();
</script>
{% endblock %}
